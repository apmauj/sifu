services:
  # Backend - FastAPI
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ui-calculator-backend
    ports:
      - "8000:8000"
    volumes:
      - ui_data:/app/data
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/ui_data.db
    networks:
      - ui-calculator-network
    restart: unless-stopped

  # Frontend - Nginx (usando build existente)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.simple
    container_name: ui-calculator-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ui-calculator-network
    restart: unless-stopped

volumes:
  ui_data:
    driver: local

networks:
  ui-calculator-network:
    driver: bridge 