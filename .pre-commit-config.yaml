repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest fast subset
        entry: python scripts/precommit_pytest_fast.py
        language: system
        pass_filenames: false
        stages: [commit]

ci:
  autofix_prs: false
  autoupdate_schedule: quarterly