name: CI/CD

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - 'frontend/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      force_frontend_deploy:
        description: 'Forzar deploy frontend (Pages)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # SECURITY AUDITS
  # ============================================
  security-backend:
    name: Security Audit Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip 'setuptools>=78.1.1'
          python -m pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
          python -m pip install --upgrade pip-audit

      - name: pip-audit
        id: audit
        run: |
          python -m pip_audit -r requirements.txt -f json > pip_audit_backend.json 2>/dev/null || true
          
          # Count high/critical vulnerabilities
          HC=0
          if [ -f pip_audit_backend.json ]; then
            HC=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('pip_audit_backend.json'))
              pkgs = data.get('dependencies', data) if isinstance(data, dict) else data
              if isinstance(pkgs, dict): pkgs = pkgs.values()
              count = 0
              for pkg in (pkgs if isinstance(pkgs, list) else [pkgs]):
                  vulns = pkg.get('vulns', []) if isinstance(pkg, dict) else []
                  for v in vulns:
                      sev = v.get('severity', {})
                      if isinstance(sev, dict): sev = sev.get('value', '')
                      if str(sev).lower() in ('high', 'critical'): count += 1
              print(count)
          except: print(0)
          " 2>/dev/null || echo 0)
          fi
          
          echo "hc=$HC" >> "$GITHUB_OUTPUT"
          echo "High/Critical vulnerabilities: $HC"
          
          if [ "$HC" -gt 0 ]; then
            echo "FAIL: $HC High/Critical vulnerabilities found"
            exit 1
          fi
          echo "Backend audit PASS"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-audit
          path: pip_audit_backend.json

  security-frontend:
    name: Security Audit Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm audit prod
        id: audit
        run: |
          npm ci --ignore-scripts --no-audit
          npm audit --omit=dev --json > audit.prod.json 2>/dev/null || true
          
          # Count high/critical
          HC=$(node -e "
            try {
              const a = require('./audit.prod.json');
              let c = 0;
              if (a.vulnerabilities) Object.values(a.vulnerabilities).forEach(v => { if (v.severity==='high'||v.severity==='critical') c++; });
              console.log(c);
            } catch { console.log(0); }
          " 2>/dev/null || echo 0)
          
          echo "hc=$HC" >> "$GITHUB_OUTPUT"
          echo "High/Critical vulnerabilities: $HC"
          
          if [ "$HC" -gt 0 ]; then
            echo "FAIL: $HC High/Critical vulnerabilities found"
            exit 1
          fi
          echo "Frontend audit PASS"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-audit
          path: frontend/audit.prod.json

  # ============================================
  # TESTS
  # ============================================
  backend-tests:
    name: Backend Tests
    needs: [ security-backend ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install deps and run tests
        env:
          PYTHONUNBUFFERED: '1'
          SIFU_SKIP_BOOTSTRAP: '1'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff
          
          echo "=== Lint (ruff) ==="
          ruff check .
          
          echo "=== Static message duplication check ==="
          python scripts/util/check_messages.py
          
          echo "=== Verify Alembic migrations ==="
          python -m alembic -c config/alembic.ini upgrade head --sql > /dev/null 2>&1 || true
          echo "Alembic migrations validated"
          
          echo "=== Run backend tests ==="
          python -m pytest tests -q --maxfail=1 --disable-warnings --tb=short --ignore=tests/demo --asyncio-mode=auto

  frontend-tests:
    name: Frontend Tests
    needs: [ security-frontend ]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps and run tests
        run: |
          npm ci --ignore-scripts
          echo "=== Lint ==="
          npm run lint
          echo "=== Tests ==="
          npm test -- --run --reporter=verbose

  # ============================================
  # BUILD & DEPLOY FRONTEND TO GITHUB PAGES
  # ============================================
  build-frontend:
    name: Build Frontend (artifact)
    runs-on: ubuntu-latest
    needs: [ frontend-tests ]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') || 
      (github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy == 'true')
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          VITE_PUBLIC_API_URL: ${{ secrets.VITE_PUBLIC_API_URL }}
          VITE_APP_BUILD_SHA: ${{ github.sha }}
          VITE_APP_BUILD_DATE: "${{ github.run_id }}-${{ github.run_number }}"
        run: |
          echo "API URL: ${VITE_PUBLIC_API_URL:-NOT SET}"
          npm ci --ignore-scripts
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy-frontend:
    name: Deploy Frontend (Pages)
    needs: [ build-frontend ]
    runs-on: ubuntu-latest
    if: needs.build-frontend.result == 'success'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================
  # PIPELINE SUMMARY
  # ============================================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
      - security-backend
      - security-frontend
      - backend-tests
      - frontend-tests
      - build-frontend
      - deploy-frontend
    steps:
      - name: Build summary
        run: |
          {
            echo "### CI/CD Summary"
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| security-backend | ${{ needs.security-backend.result }} |"
            echo "| security-frontend | ${{ needs.security-frontend.result }} |"
            echo "| backend-tests | ${{ needs.backend-tests.result }} |"
            echo "| frontend-tests | ${{ needs.frontend-tests.result }} |"
            echo "| build-frontend | ${{ needs.build-frontend.result }} |"
            echo "| deploy-frontend | ${{ needs.deploy-frontend.result }} |"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          
          # Determine overall result
          OVERALL="success"
          for r in "${{ needs.security-backend.result }}" "${{ needs.security-frontend.result }}" "${{ needs.backend-tests.result }}" "${{ needs.frontend-tests.result }}"; do
            if [ "$r" != "success" ] && [ "$r" != "skipped" ] && [ -n "$r" ]; then
              OVERALL="failure"
            fi
          done
          
          echo "Overall core result: $OVERALL" >> "$GITHUB_STEP_SUMMARY"
          if [ "$OVERALL" != "success" ]; then exit 1; fi
