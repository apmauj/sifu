name: CI/CD

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - 'Dockerfile'
      - 'frontend/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      force_image:
        description: 'Forzar build & push de imagen backend'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      force_frontend_deploy:
        description: 'Forzar deploy frontend (Pages)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      override_tunnel_guard:
        description: 'Ignorar guard de túnel (solo workflow_dispatch)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

permissions:
  contents: read
  packages: write   # Docker Hub push
  pages: write      # Pages deploy
  id-token: write   # Pages OIDC

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tunnel-guard:
    name: Tunnel Guard
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      tunnel_ok: ${{ steps.evaluate.outputs.tunnel_ok }}
    steps:
      - name: Evaluar estado del túnel/API
        id: evaluate
        env:
          SECRET_API_URL: ${{ secrets.VITE_PUBLIC_API_URL }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -e
          if [ -z "$SECRET_API_URL" ]; then
            echo "Secret VITE_PUBLIC_API_URL vacío" >> $GITHUB_STEP_SUMMARY
            echo "tunnel_ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Normalizar quitando /api final si existe
          BASE_URL="$SECRET_API_URL"
          BASE_URL="${BASE_URL%/}"
          if echo "$BASE_URL" | grep -qE '/api$'; then
            ORIGIN="${BASE_URL%/api}"
          else
            ORIGIN="$BASE_URL"
          fi
          HOST=$(echo "$ORIGIN" | sed -E 's#https?://([^/]+).*#\1#')
          IS_TUNNEL=0
          if echo "$HOST" | grep -qi 'trycloudflare'; then IS_TUNNEL=1; fi
          TARGET="${ORIGIN}/api/health/simple"
          # Fallback si endpoint simple no existe
          CODE=$(curl -sS -m 8 -o /dev/null -w '%{http_code}' "$TARGET" || true)
          if [ -z "$CODE" ] || [ "$CODE" = "000" ]; then
            # Intentar básico /api/health
            TARGET="${ORIGIN}/api/health"
            CODE=$(curl -sS -m 8 -o /dev/null -w '%{http_code}' "$TARGET" || true)
          fi
          # Considerar OK si respondió cualquier código <500
          if [ -n "$CODE" ] && [ "$CODE" -lt 500 ]; then
            OK=true
          else
            OK=false
          fi
          echo "Host: $HOST" >> $GITHUB_STEP_SUMMARY
          echo "Endpoint probado: $TARGET (HTTP $CODE)" >> $GITHUB_STEP_SUMMARY
          if [ $IS_TUNNEL -eq 1 ]; then
            echo "Tipo: trycloudflare (dinámico)" >> $GITHUB_STEP_SUMMARY
          else
            echo "Tipo: host estable" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "$OK" = true ]; then
            echo "Resultado guard: OK" >> $GITHUB_STEP_SUMMARY
            echo "tunnel_ok=true" >> $GITHUB_OUTPUT
          else
            echo "Resultado guard: FALLÓ (no alcanzable / código >=500)" >> $GITHUB_STEP_SUMMARY
            # Solo bloquear en push automático a master si es túnel y está caído; en PR/dispatch permitir override
            if [ "$EVENT_NAME" = "push" ] && [ "$IS_TUNNEL" -eq 1 ]; then
              echo "tunnel_ok=false" >> $GITHUB_OUTPUT
            else
              echo "tunnel_ok=false" >> $GITHUB_OUTPUT
            fi
          fi
  security-backend:
    name: Security Audit Backend
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip 'setuptools>=78.1.1'
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install --upgrade pip-audit
      - name: pip-audit
        id: audit
        run: |
          set +e
          pip-audit -r requirements.txt -f json > pip_audit_backend.json 2>/dev/null
          code=$?
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          # Contar vulnerabilidades high/critical
          if command -v jq >/dev/null 2>&1; then
            HC=$(jq '[ .[] | .vulns[]? | select((.severity.value // .severity) | ascii_downcase | IN("high","critical")) ] | length' pip_audit_backend.json 2>/dev/null || echo 0)
          else
            HC=0
          fi
          echo "hc=$HC" >> $GITHUB_OUTPUT
          if [ "${HC:-0}" -gt 0 ]; then
            echo "High/Critical vulns: $HC" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Backend audit PASS sin High/Critical" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-audit
          path: pip_audit_backend.json

  security-frontend:
    name: Security Audit Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 6
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit
      - name: npm audit prod
        id: audit
        run: |
          set +e
            npm audit --omit=dev --json > audit.prod.json 2>/dev/null || true
          if command -v jq >/dev/null 2>&1; then
            HC=$(jq '[ (.vulnerabilities // {}) | to_entries[] | select(.value.severity=="high" or .value.severity=="critical") ] | length' audit.prod.json 2>/dev/null || echo 0)
          else
            HC=0
          fi
          echo "hc=$HC" >> $GITHUB_OUTPUT
          if [ "${HC:-0}" -gt 0 ]; then
            echo "High/Critical vulns Frontend: $HC" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Frontend audit PASS sin High/Critical" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-audit
          path: frontend/audit.prod.json

  backend-tests:
    name: Backend Tests
    needs: [ security-backend ]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Static message duplication check
        run: python scripts/util/check_messages.py
      - name: Verify Alembic migrations
        run: |
          # Verify migrations are properly configured (generates SQL without executing)
          alembic -c config/alembic.ini upgrade head --sql > /dev/null
          echo "Alembic migrations validated successfully"
      - name: Run backend tests
        env:
          PYTHONUNBUFFERED: '1'
          SIFU_SKIP_BOOTSTRAP: '1'
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: pytest -q --maxfail=1 --disable-warnings --tb=short

  frontend-tests:
    name: Frontend Tests
    needs: [ security-frontend ]
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install deps
        run: npm ci
      - name: Lint & Tests
        run: |
          npm run lint
          npm test -- --run --reporter=verbose

  build-frontend:
    name: Build Frontend (artifact)
    runs-on: ubuntu-latest
    needs: [ frontend-tests, tunnel-guard ]
    if: ((github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy == 'true')) && (needs.tunnel-guard.outputs.tunnel_ok == 'true' || (github.event_name == 'workflow_dispatch' && inputs.override_tunnel_guard == 'true'))
    permissions:
      contents: read
      pages: write
      id-token: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: (Optional) Mostrar host actual del secret
        run: |
          if [ -n "${{ secrets.VITE_PUBLIC_API_URL }}" ]; then
            host=$(echo "${{ secrets.VITE_PUBLIC_API_URL }}" | sed -E 's#https?://([^/]+)/?.*#\1#')
            echo "Host API (secret): $host" >> $GITHUB_STEP_SUMMARY
          else
            echo "Secret VITE_PUBLIC_API_URL vacío" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Resolve API URL (secret)
        id: resolve_api
        env:
          SECRET_API_URL: ${{ secrets.VITE_PUBLIC_API_URL }}
        run: |
          API_URL="${SECRET_API_URL}"
          if [ -z "$API_URL" ]; then
            echo "ERROR: Secret VITE_PUBLIC_API_URL no definido." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          API_URL=$(echo "$API_URL" | sed -E 's#(/api)?/?$##')
          API_URL="$API_URL/api"
          echo "VITE_PUBLIC_API_URL=$API_URL" >> $GITHUB_ENV
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - name: Install deps
        run: npm ci
      - name: Build
        env:
          NODE_ENV: production
          VITE_APP_BUILD_SHA: ${{ github.sha }}
          VITE_APP_BUILD_DATE: ${{ github.run_id }}-${{ github.run_number }}
        run: |
          echo "Using build metadata SHA=${VITE_APP_BUILD_SHA} DATE=${VITE_APP_BUILD_DATE}" >> $GITHUB_STEP_SUMMARY
          npm run build --silent
      - name: Prepare SPA 404 redirect
        run: cp dist/index.html dist/404.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  publish-backend-image:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    needs: [ backend-tests ]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.force_image == 'true')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: apmauj/sifu-backend
          tags: |
            type=raw,value=latest
            type=sha
            type=raw,value={{date '2006-01-02'}}
            type=raw,value={{date '20060102'}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: [ build-frontend ]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: 'pages'
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    if: always()
    needs:
    - tunnel-guard
    - security-backend
    - security-frontend
    - backend-tests
    - frontend-tests
    - publish-backend-image
    - build-frontend
    - deploy-frontend
    steps:
      - name: Build summary
        run: |
          echo "### CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| tunnel-guard | ${{ needs.tunnel-guard.result }} (ok=${{ needs.tunnel-guard.outputs.tunnel_ok }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| security-backend | ${{ needs.security-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| security-frontend | ${{ needs.security-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| backend-tests | ${{ needs.backend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| frontend-tests | ${{ needs.frontend-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          if [ '${{ needs.publish-backend-image.result }}' != '' ]; then echo "| publish-backend-image | ${{ needs.publish-backend-image.result }} |" >> $GITHUB_STEP_SUMMARY; fi
          if [ '${{ needs.build-frontend.result }}' != '' ]; then echo "| build-frontend | ${{ needs.build-frontend.result }} |" >> $GITHUB_STEP_SUMMARY; fi
          if [ '${{ needs.deploy-frontend.result }}' != '' ]; then echo "| deploy-frontend | ${{ needs.deploy-frontend.result }} |" >> $GITHUB_STEP_SUMMARY; fi
          echo "" >> $GITHUB_STEP_SUMMARY
          overall=success
          for r in ${{ needs.security-backend.result }} ${{ needs.security-frontend.result }} ${{ needs.backend-tests.result }} ${{ needs.frontend-tests.result }}; do
            if [ "$r" != "success" ]; then overall=failure; fi
          done
          echo "Overall core result: $overall" >> $GITHUB_STEP_SUMMARY
          if [ "$overall" != "success" ]; then exit 1; fi
