name: CI/CD

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - 'config/docker/Dockerfile'
      - 'config/docker/docker-compose*.yml'
      - 'frontend/**'
      - '.github/workflows/*.yml'
  pull_request:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      force_image:
        description: 'Forzar build & push de imagen backend'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      force_frontend_deploy:
        description: 'Forzar deploy frontend (Pages)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']
      override_tunnel_guard:
        description: 'Ignorar guard de túnel (solo workflow_dispatch)'
        required: false
        default: 'false'
        type: choice
        options: ['false','true']

permissions:
  contents: read
  packages: write   # Docker Hub push
  pages: write      # Pages deploy
  id-token: write   # Pages OIDC

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # TUNNEL GUARD - Verificar conectividad API
  # ============================================
  tunnel-guard:
    name: Tunnel Guard
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 3
    outputs:
      tunnel_ok: ${{ steps.evaluate.outputs.tunnel_ok }}
    steps:
      - name: Evaluar estado del túnel/API
        id: evaluate
        shell: pwsh
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          $SecretApiUrl = "${{ secrets.VITE_PUBLIC_API_URL }}"
          $EventName = "${{ github.event_name }}"
          
          function Trigger-Recovery {
            $Token = $env:GH_PAT
            if ([string]::IsNullOrEmpty($Token)) { $Token = "${{ secrets.GITHUB_TOKEN }}" }
            if ([string]::IsNullOrEmpty($Token)) {
              Write-Host "⚠️  GH_TOKEN no disponible; no se puede disparar update-tunnel"
              return
            }
            $env:GH_TOKEN = $Token
            try {
              gh workflow run .github/workflows/update-tunnel.yml -R "${{ github.repository }}" --ref "${{ github.ref_name }}"
              Write-Host "🔄 Se disparó update-tunnel.yml automáticamente"
            } catch {
              Write-Host "❌ No se pudo disparar update-tunnel.yml"
            }
          }

          function Get-TunnelHostFromDocker {
            param(
              [string]$ContainerName = 'sifu-tunnel',
              [int]$Tail = 160
            )

            try {
              $logs = docker logs --tail $Tail $ContainerName 2>$null
              if ([string]::IsNullOrWhiteSpace($logs)) { return $null }
              $regex = 'https://[a-zA-Z0-9-]+\.trycloudflare\.com'
              $matches = [regex]::Matches($logs, $regex)
              if ($matches.Count -gt 0) {
                return $matches[$matches.Count - 1].Value
              }
            } catch {
              Write-Host "⚠️  No se pudo leer logs de ${ContainerName}: $_"
            }
            return $null
          }
          
          if ([string]::IsNullOrEmpty($SecretApiUrl)) {
            Write-Host "Secret VITE_PUBLIC_API_URL vacío"
            echo "tunnel_ok=false" >> $env:GITHUB_OUTPUT
            Trigger-Recovery
            exit 0
          }
          
          # Normalizar URL
          $BaseUrl = $SecretApiUrl.TrimEnd('/')
          if ($BaseUrl -match '/api$') {
            $Origin = $BaseUrl -replace '/api$', ''
          } else {
            $Origin = $BaseUrl
          }
          
          $Host_ = ([Uri]$Origin).Host
          $IsTunnel = $Host_ -match 'trycloudflare'
          $Target = "$Origin/api/health/simple"

          if ($IsTunnel) {
            $DetectedTunnel = Get-TunnelHostFromDocker
            if ($DetectedTunnel) {
              try {
                $DetectedHost = ([Uri]$DetectedTunnel).Host
                if ($DetectedHost -ne $Host_) {
                  Write-Host "⚠️  Secret apunta a $Host_ pero el túnel activo es $DetectedHost"
                  echo "tunnel_ok=false" >> $env:GITHUB_OUTPUT
                  Trigger-Recovery
                  exit 0
                }
              } catch {
                Write-Host "⚠️  No se pudo comparar host detectado: $_"
              }
            }
          }
          
          # Probar conectividad
          try {
            $response = Invoke-WebRequest -Uri $Target -UseBasicParsing -TimeoutSec 8 -ErrorAction SilentlyContinue
            $Code = $response.StatusCode
          } catch {
            # Intentar endpoint alternativo
            try {
              $Target = "$Origin/api/health"
              $response = Invoke-WebRequest -Uri $Target -UseBasicParsing -TimeoutSec 8 -ErrorAction SilentlyContinue
              $Code = $response.StatusCode
            } catch {
              $Code = 0
            }
          }
          
          $OK = ($Code -gt 0 -and $Code -lt 500)
          
          Write-Host "Host: $Host_"
          Write-Host "Endpoint probado: $Target (HTTP $Code)"
          if ($IsTunnel) { Write-Host "Tipo: trycloudflare (dinámico)" } else { Write-Host "Tipo: host estable" }
          
          if ($OK) {
            Write-Host "Resultado guard: OK"
            echo "tunnel_ok=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "Resultado guard: FALLÓ (no alcanzable / código >=500)"
            echo "tunnel_ok=false" >> $env:GITHUB_OUTPUT
            if ($IsTunnel) { Trigger-Recovery }
          }

  # ============================================
  # SECURITY AUDITS
  # ============================================
  security-backend:
    name: Security Audit Backend
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python environment
        shell: pwsh
        run: |
          # Usar el venv existente o crear uno
          if (Test-Path ".venv/Scripts/Activate.ps1") {
            . .venv/Scripts/Activate.ps1
          }
          python -m pip install --upgrade pip setuptools
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
          if (Test-Path "requirements-dev.txt") { pip install -r requirements-dev.txt }
          pip install --upgrade pip-audit
      
      - name: pip-audit
        id: audit
        shell: pwsh
        run: |
          if (Test-Path ".venv/Scripts/Activate.ps1") { . .venv/Scripts/Activate.ps1 }
          
          # Run pip-audit
          pip-audit -r requirements.txt -f json 2>$null | Out-File -FilePath pip_audit_backend.json -Encoding utf8
          
          # Count high/critical vulnerabilities
          $HC = 0
          if (Test-Path pip_audit_backend.json) {
            try {
              $audit = Get-Content pip_audit_backend.json | ConvertFrom-Json
              foreach ($pkg in $audit) {
                foreach ($vuln in $pkg.vulns) {
                  $severity = if ($vuln.severity.value) { $vuln.severity.value } else { $vuln.severity }
                  if ($severity -match 'high|critical') { $HC++ }
                }
              }
            } catch { }
          }
          
          echo "hc=$HC" >> $env:GITHUB_OUTPUT
          
          if ($HC -gt 0) {
            Write-Host "High/Critical vulns: $HC"
            exit 1
          }
          Write-Host "Backend audit PASS sin High/Critical"
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-audit
          path: pip_audit_backend.json

  security-frontend:
    name: Security Audit Frontend
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 6
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: npm audit prod
        id: audit
        shell: pwsh
        run: |
          # Use --ignore-scripts to skip husky install (bash syntax incompatible with Windows)
          npm ci --ignore-scripts --no-audit 2>$null
          npm audit --omit=dev --json 2>$null | Out-File -FilePath audit.prod.json -Encoding utf8
          
          # Count high/critical vulnerabilities
          $HC = 0
          if (Test-Path audit.prod.json) {
            try {
              $audit = Get-Content audit.prod.json | ConvertFrom-Json
              if ($audit.vulnerabilities) {
                foreach ($key in $audit.vulnerabilities.PSObject.Properties.Name) {
                  $vuln = $audit.vulnerabilities.$key
                  if ($vuln.severity -match 'high|critical') { $HC++ }
                }
              }
            } catch { }
          }
          
          echo "hc=$HC" >> $env:GITHUB_OUTPUT
          
          if ($HC -gt 0) {
            Write-Host "High/Critical vulns Frontend: $HC"
            exit 1
          }
          Write-Host "Frontend audit PASS sin High/Critical"
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-audit
          path: frontend/audit.prod.json

  # ============================================
  # TESTS
  # ============================================
  backend-tests:
    name: Backend Tests
    needs: [ security-backend ]
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps and run tests
        shell: pwsh
        env:
          PYTHONUNBUFFERED: '1'
          SIFU_SKIP_BOOTSTRAP: '1'
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
        run: |
          if (Test-Path ".venv/Scripts/Activate.ps1") { . .venv/Scripts/Activate.ps1 }
          python -m pip install --upgrade pip
          if (Test-Path "requirements.txt") { pip install -r requirements.txt }
          if (Test-Path "requirements-dev.txt") { pip install -r requirements-dev.txt }
          pip install ruff
          
          Write-Host "=== Lint (ruff) ==="
          ruff check .
          
          Write-Host "=== Static message duplication check ==="
          python scripts/util/check_messages.py
          
          Write-Host "=== Verify Alembic migrations ==="
          alembic -c config/alembic.ini upgrade head --sql | Out-Null
          Write-Host "Alembic migrations validated successfully"
          
          Write-Host "=== Run backend tests ==="
          pytest -q --maxfail=1 --disable-warnings --tb=short

  frontend-tests:
    name: Frontend Tests
    needs: [ security-frontend ]
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 12
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps and run tests
        shell: pwsh
        run: |
          # Use --ignore-scripts to skip husky install (bash syntax incompatible with Windows)
          npm ci --ignore-scripts
          
          Write-Host "=== Lint ==="
          npm run lint
          
          Write-Host "=== Tests ==="
          npm test -- --run --reporter=verbose

  # ============================================
  # BUILD & DEPLOY FRONTEND TO GITHUB PAGES
  # ============================================
  build-frontend:
    name: Build Frontend (artifact)
    runs-on: [self-hosted, sifu-local]
    needs: [ frontend-tests, tunnel-guard ]
    if: |
      ((github.event_name == 'push' && github.ref == 'refs/heads/master') || 
       (github.event_name == 'workflow_dispatch' && inputs.force_frontend_deploy == 'true')) && 
      (needs.tunnel-guard.outputs.tunnel_ok == 'true' || 
       (github.event_name == 'workflow_dispatch' && inputs.override_tunnel_guard == 'true'))
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Resolve API URL and Build
        shell: pwsh
        env:
          VITE_APP_BUILD_SHA: ${{ github.sha }}
          VITE_APP_BUILD_DATE: "${{ github.run_id }}-${{ github.run_number }}"
        run: |
          $ApiUrl = "${{ secrets.VITE_PUBLIC_API_URL }}"
          if ([string]::IsNullOrEmpty($ApiUrl)) {
            Write-Host "ERROR: Secret VITE_PUBLIC_API_URL no definido."
            exit 1
          }
          # Normalizar URL
          $ApiUrl = $ApiUrl.TrimEnd('/') -replace '/api$', ''
          $ApiUrl = "$ApiUrl/api"
          $env:VITE_PUBLIC_API_URL = $ApiUrl
          
          $host_ = ([Uri]$ApiUrl).Host
          Write-Host "Host API (secret): $host_"
          Write-Host "Using build metadata SHA=$env:VITE_APP_BUILD_SHA DATE=$env:VITE_APP_BUILD_DATE"
          
          # Clean everything for fresh install (self-hosted runners persist state)
          Write-Host "Cleaning npm cache and node_modules..."
          npm cache clean --force 2>$null
          if (Test-Path node_modules) { Remove-Item node_modules -Recurse -Force -ErrorAction SilentlyContinue }
          if (Test-Path package-lock.json) { Remove-Item package-lock.json -Force -ErrorAction SilentlyContinue }
          
          # Fresh install - WITHOUT NODE_ENV=production so devDependencies are installed
          Write-Host "Installing dependencies (including devDependencies for vite)..."
          npm install --ignore-scripts
          
          $pkgCount = (Get-ChildItem node_modules -Directory -ErrorAction SilentlyContinue | Measure-Object).Count
          Write-Host "Installed $pkgCount top-level packages in node_modules"
          
          # Verify vite is available
          if (-not (Test-Path "node_modules/.bin/vite.cmd")) {
            Write-Host "ERROR: vite not found in node_modules/.bin"
            Get-ChildItem node_modules/.bin -ErrorAction SilentlyContinue | Select-Object -First 20
            exit 1
          }
          
          # NOW set production mode for the build
          $env:NODE_ENV = "production"
          npm run build --silent
          
          # Prepare SPA 404 redirect
          Copy-Item dist/index.html dist/404.html
      
      - name: Deploy to GitHub Pages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Configure git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create a temp directory for gh-pages
          $tempDir = New-Item -ItemType Directory -Path "$env:RUNNER_TEMP\gh-pages" -Force
          
          # Copy dist contents
          Copy-Item -Path "dist\*" -Destination $tempDir -Recurse -Force
          
          # Add .nojekyll to bypass Jekyll processing
          New-Item -Path "$tempDir\.nojekyll" -ItemType File -Force | Out-Null
          
          # Initialize git in temp directory
          Push-Location $tempDir
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy to GitHub Pages - ${{ github.sha }}"
          
          # Push to gh-pages branch
          $repoUrl = "https://x-access-token:$env:GITHUB_TOKEN@github.com/${{ github.repository }}.git"
          git push $repoUrl gh-pages --force
          
          Pop-Location
          Write-Host "✅ Deployed to GitHub Pages"

  # ============================================
  # BUILD & PUSH BACKEND IMAGE
  # ============================================
  publish-backend-image:
    name: Build & Push Backend Image
    runs-on: [self-hosted, sifu-local]
    needs: [ backend-tests ]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || (github.event_name == 'workflow_dispatch' && inputs.force_image == 'true')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and push Docker image
        shell: pwsh
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          # Login to Docker Hub
          echo $env:DOCKERHUB_TOKEN | docker login -u $env:DOCKERHUB_USERNAME --password-stdin
          
          # Generate tags
          $sha = "${{ github.sha }}".Substring(0, 7)
          $dateTag = Get-Date -Format 'yyyy-MM-dd'
          $dateTagShort = Get-Date -Format 'yyyyMMdd'
          
          $imageName = "apmauj/sifu-backend"
          $tags = @(
            "${imageName}:latest",
            "${imageName}:sha-${sha}",
            "${imageName}:${dateTag}",
            "${imageName}:${dateTagShort}"
          )
          
          # Build image
          Write-Host "Building image..."
          docker build -t "${imageName}:latest" -f config/docker/Dockerfile .
          
          # Tag and push
          foreach ($tag in $tags) {
            Write-Host "Tagging and pushing: $tag"
            docker tag "${imageName}:latest" $tag
            docker push $tag
          }
          
          Write-Host "✅ Image pushed successfully"

      - name: Cleanup old local Docker tags
        if: always()
        shell: pwsh
        run: |
          $keepCount = [int]"${{ vars.LOCAL_DOCKER_TAGS_TO_KEEP || '6' }}"
          if ($keepCount -lt 1) { $keepCount = 1 }
          $imageName = 'apmauj/sifu-backend'
          $raw = docker images $imageName --format "{{.Repository}}|{{.Tag}}|{{.CreatedAt}}"
          if (-not $raw) {
            Write-Host "No local images found for cleanup"
            exit 0
          }
          $images = @()
          foreach ($line in $raw) {
            if ([string]::IsNullOrWhiteSpace($line)) { continue }
            $parts = $line -split '\|'
            if ($parts.Length -lt 3) { continue }
            $repo = $parts[0].Trim()
            $tagName = $parts[1].Trim()
            if ($tagName -eq '<none>') { continue }
            $tagFull = "$repo:$tagName"
            try {
              $created = Get-Date ($parts[2].Trim())
            } catch {
              $created = Get-Date
            }
            $images += [pscustomobject]@{ Tag = $tagFull; Created = $created }
          }
          if ($images.Count -le $keepCount) {
            Write-Host "Nothing to prune; only $($images.Count) tags present"
            exit 0
          }
          $toRemove = $images | Sort-Object Created -Descending | Select-Object -Skip $keepCount
          foreach ($item in $toRemove) {
            Write-Host "Removing local tag $($item.Tag)"
            docker rmi $item.Tag 2>$null | Out-Null
          }
          Write-Host "🧹 Removed $($toRemove.Count) old local tags (kept $keepCount)"

  # ============================================
  # PIPELINE SUMMARY
  # ============================================
  summary:
    name: Pipeline Summary
    runs-on: [self-hosted, sifu-local]
    if: always()
    needs:
      - tunnel-guard
      - security-backend
      - security-frontend
      - backend-tests
      - frontend-tests
      - publish-backend-image
      - build-frontend
    steps:
      - name: Build summary
        shell: pwsh
        run: |
          $lines = @()
          $lines += "### CI/CD Summary"
          $lines += "| Job | Result |"
          $lines += "|-----|--------|"
          $lines += "| tunnel-guard | ${{ needs.tunnel-guard.result }} (ok=${{ needs.tunnel-guard.outputs.tunnel_ok }}) |"
          $lines += "| security-backend | ${{ needs.security-backend.result }} |"
          $lines += "| security-frontend | ${{ needs.security-frontend.result }} |"
          $lines += "| backend-tests | ${{ needs.backend-tests.result }} |"
          $lines += "| frontend-tests | ${{ needs.frontend-tests.result }} |"
          
          $pubResult = "${{ needs.publish-backend-image.result }}"
          if ($pubResult) { $lines += "| publish-backend-image | $pubResult |" }
          
          $buildResult = "${{ needs.build-frontend.result }}"
          if ($buildResult) { $lines += "| build-frontend | $buildResult |" }
          
          $lines += ""
          
          # Determine overall result
          $overall = "success"
          $results = @(
            "${{ needs.security-backend.result }}",
            "${{ needs.security-frontend.result }}",
            "${{ needs.backend-tests.result }}",
            "${{ needs.frontend-tests.result }}"
          )
          foreach ($r in $results) {
            if ($r -ne "success" -and $r -ne "skipped" -and ![string]::IsNullOrEmpty($r)) {
              $overall = "failure"
            }
          }
          
          $lines += "Overall core result: $overall"
          
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          
          if ($overall -ne "success") { exit 1 }
