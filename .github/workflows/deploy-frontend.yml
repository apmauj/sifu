name: Deploy Frontend to GitHub Pages (deprecated)

# Deprecated: replaced by ci-cd.yml. Kept for manual runs only.
on:
  workflow_dispatch:

# Recomendado por GitHub Pages Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Resolve API URL (secret)
        id: resolve_api
        run: |
          API_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          if [ -z "$API_URL" ]; then
            echo "ERROR: VITE_PUBLIC_API_URL no definido." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          # Normalizar: quitar /api o slash final y re-anexar /api
            API_URL=$(echo "$API_URL" | sed -E 's#(/api)?/?$##')
          API_URL="$API_URL/api"
          host=$(echo "$API_URL" | sed -E 's#https?://([^/]+)/?.*#\1#')
          echo "API host: $host" >> $GITHUB_STEP_SUMMARY
          # No mostramos la URL completa por seguridad; sólo longitud
          echo "API URL length: ${#API_URL}" >> $GITHUB_STEP_SUMMARY
          echo "VITE_PUBLIC_API_URL=$API_URL" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
        run: npm run build --silent

      - name: Post-build summary
        run: |
          echo "Post-build VITE_PUBLIC_API_URL length: ${#VITE_PUBLIC_API_URL}" >> $GITHUB_STEP_SUMMARY

      - name: Prepare SPA 404 redirect
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
