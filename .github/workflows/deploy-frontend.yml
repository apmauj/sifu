name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ master ]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

# Recomendado por GitHub Pages Actions
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Debug VITE_PUBLIC_API_URL presence
        run: |
          if [ -n "${{ secrets.VITE_PUBLIC_API_URL }}" ]; then
            echo "VITE_PUBLIC_API_URL secret está definido (length=${#VITE_PUBLIC_API_URL})" >> $GITHUB_STEP_SUMMARY
            host=$(echo "${{ secrets.VITE_PUBLIC_API_URL }}" | sed -E 's#https?://([^/]+)/?.*#\1#')
            echo "Dominio detectado: $host" >> $GITHUB_STEP_SUMMARY
          else
            echo "VITE_PUBLIC_API_URL NO está definido" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          NODE_ENV: production
          # URL del backend público (secret preferido; fallback a variable de repo si existe)
          VITE_PUBLIC_API_URL: ${{ secrets.VITE_PUBLIC_API_URL || vars.VITE_PUBLIC_API_URL }}
        run: npm run build --silent

      - name: Fail if VITE_PUBLIC_API_URL still undefined
        run: |
          if [ -z "$VITE_PUBLIC_API_URL" ]; then
            echo "ERROR: VITE_PUBLIC_API_URL no definido (ni secret ni variable)." >&2
            exit 1
          fi

      - name: Prepare SPA 404 redirect
        run: cp dist/index.html dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
