# Deploy Frontend to GitHub Pages — Render Migration
#
# Workflow temporal para deployar el frontend apuntando a Render,
# sin depender del tunnel-guard ni del runner self-hosted.
#
# Una vez completada la migración y limpiado el CI/CD principal,
# este workflow se puede eliminar.

name: Deploy Frontend (Render)

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        env:
          VITE_PUBLIC_API_URL: ${{ secrets.VITE_PUBLIC_API_URL }}
          VITE_APP_BUILD_SHA: ${{ github.sha }}
          VITE_APP_BUILD_DATE: "${{ github.run_id }}-${{ github.run_number }}"
        run: |
          echo "API URL: ${VITE_PUBLIC_API_URL:-NOT SET}"
          npm ci --ignore-scripts
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
