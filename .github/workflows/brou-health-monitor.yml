name: BROU Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
  workflow_dispatch:
    inputs:
      fail_on_empty:
        description: 'Fallar si BROU data está vacía'
        required: false
        default: true
        type: boolean
      max_age_minutes:
        description: 'Edad máxima permitida en minutos'
        required: false
        default: 60
        type: number

permissions:
  contents: read
  issues: write  # Para crear issues si hay problemas

jobs:
  monitor-brou:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check BROU Health
        id: brou_check
        run: |
          # Configurar variables
          FAIL_ON_EMPTY="${{ github.event.inputs.fail_on_empty || 'true' }}"
          MAX_AGE_MINUTES="${{ github.event.inputs.max_age_minutes || '60' }}"
          BROU_ENDPOINT="${{ secrets.VITE_PUBLIC_API_URL }}/brou/current?full=true"

          echo "Configuración:"
          echo "- FAIL_ON_EMPTY: $FAIL_ON_EMPTY"
          echo "- MAX_AGE_MINUTES: $MAX_AGE_MINUTES"
          echo "- BROU_ENDPOINT: $BROU_ENDPOINT"

          # Hacer request a BROU endpoint desplegado
          echo "Consultando BROU endpoint en producción..."
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "$BROU_ENDPOINT")

          # Separar body y status
          BODY=$(echo "$RESPONSE" | head -n -1)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1 | cut -d: -f2)

          echo "HTTP Status: $HTTP_STATUS"

          # Verificar status HTTP
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: BROU endpoint retornó HTTP $HTTP_STATUS"
            echo "response_body=$BODY" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "error_type=http_error" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Parsear respuesta JSON
          DATA_LENGTH=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              # Verificar que la respuesta tenga la estructura esperada
              if not isinstance(data, dict):
                  print(f'0|error: Response is not a JSON object')
                  sys.exit(1)
              
              # Extraer datos del campo 'data' si existe
              data_list = data.get('data', [])
              if not isinstance(data_list, list):
                  print(f'0|error: data field is not a list')
                  sys.exit(1)
                  
              data_len = len(data_list)
              timestamp = data.get('timestamp', '')
              print(f'{data_len}|{timestamp}')
          except json.JSONDecodeError as e:
              print(f'0|error: Invalid JSON - {e}')
              sys.exit(1)
          except Exception as e:
              print(f'0|error: {e}')
              sys.exit(1)
          " 2>/dev/null || echo "0|error: Python script failed")

          DATA_COUNT=$(echo "$DATA_LENGTH" | cut -d'|' -f1)
          TIMESTAMP=$(echo "$DATA_LENGTH" | cut -d'|' -f2)

          DATA_COUNT=$(echo "$DATA_LENGTH" | cut -d'|' -f1)
          TIMESTAMP=$(echo "$DATA_LENGTH" | cut -d'|' -f2)

          echo "📊 BROU Data Count: $DATA_COUNT"
          echo "🕒 Timestamp: $TIMESTAMP"

          # Export outputs for next steps
          echo "data_count=$DATA_COUNT" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

          # Verificar si el parsing falló
          if [ "$TIMESTAMP" = "error*" ]; then
            echo "❌ ERROR: Falló el parsing de la respuesta JSON"
            echo "response_body=$BODY" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "error_type=json_parse_error" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Verificar si hay datos
          if [ "$DATA_COUNT" = "0" ] && [ "$FAIL_ON_EMPTY" = "true" ]; then
            echo "❌ ERROR: BROU retornó 0 monedas (data vacía)"
            echo "response_body=$BODY" >> $GITHUB_OUTPUT
            echo "status=error" >> $GITHUB_OUTPUT
            echo "error_type=empty_data" >> $GITHUB_OUTPUT
            exit 1
          fi

          # Verificar frescura de datos si hay timestamp
          if [ "$TIMESTAMP" != "" ] && [ "$TIMESTAMP" != "error*" ]; then
            # Calcular edad de los datos
            CURRENT_TIME=$(date -u +%s)
            DATA_TIME=$(date -u -d "$TIMESTAMP" +%s 2>/dev/null || echo "0")

            if [ "$DATA_TIME" != "0" ]; then
              AGE_SECONDS=$((CURRENT_TIME - DATA_TIME))
              AGE_MINUTES=$((AGE_SECONDS / 60))

              echo "⏱️  Datos tienen $AGE_MINUTES minutos de antigüedad"
              echo "age_minutes=$AGE_MINUTES" >> $GITHUB_OUTPUT

              if [ "$AGE_MINUTES" -gt "$MAX_AGE_MINUTES" ]; then
                echo "⚠️  ADVERTENCIA: Datos tienen más de $MAX_AGE_MINUTES minutos ($AGE_MINUTES minutos)"
                echo "response_body=$BODY" >> $GITHUB_OUTPUT
                echo "status=warning" >> $GITHUB_OUTPUT
                echo "max_age=$MAX_AGE_MINUTES" >> $GITHUB_OUTPUT
                # No fallar por edad, solo advertir
              else
                echo "✅ Datos están frescos ($AGE_MINUTES minutos)"
                echo "status=success" >> $GITHUB_OUTPUT
                echo "max_age=$MAX_AGE_MINUTES" >> $GITHUB_OUTPUT
              fi
            else
              echo "⚠️  No se pudo parsear timestamp: $TIMESTAMP"
              echo "status=warning" >> $GITHUB_OUTPUT
              echo "timestamp_error=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "ℹ️  No hay timestamp disponible para verificar frescura"
            echo "status=success" >> $GITHUB_OUTPUT
            echo "age_minutes=0" >> $GITHUB_OUTPUT
          fi

          echo "response_body=$BODY" >> $GITHUB_OUTPUT

      - name: Debug Response on Error
        if: failure() && steps.brou_check.outputs.status == 'error'
        run: |
          echo "### 🔍 BROU Response Debug" >> $GITHUB_STEP_SUMMARY
          echo "**HTTP Status:** ${{ steps.brou_check.outputs.http_status || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Error Type:** ${{ steps.brou_check.outputs.error_type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Raw Response Body:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.brou_check.outputs.response_body }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Troubleshooting Steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Check if BROU API is accessible" >> $GITHUB_STEP_SUMMARY
          echo "2. Verify JSON response format" >> $GITHUB_STEP_SUMMARY
          echo "3. Check for network connectivity issues" >> $GITHUB_STEP_SUMMARY
          echo "4. Review BROU processor logs" >> $GITHUB_STEP_SUMMARY

      - name: Create Issue on Failure
        if: failure() && steps.brou_check.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['BROU', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('BROU Health Check Failed')
            );

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 BROU Health Check Failed',
                body: `
                ## ❌ BROU Health Check Failed

                **Timestamp:** ${new Date().toISOString()}
                **Workflow Run:** ${context.payload.workflow_run?.html_url || 'N/A'}

                ### Error Details
                - **Error Type:** ${'${{ steps.brou_check.outputs.error_type }}'}
                - **HTTP Status:** ${'${{ steps.brou_check.outputs.http_status }}'}

                ### Response Body
                \`\`\`json
                ${'${{ steps.brou_check.outputs.response_body }}'}
                \`\`\`

                ### Actions Required
                1. Verificar estado del servicio BROU
                2. Revisar logs del backend
                3. Verificar conectividad con fuente BROU
                4. Ejecutar refresh manual si es necesario

                ---
                *Issue created automatically by BROU Health Monitor*
                `,
                labels: ['BROU', 'monitoring', 'bug', 'urgent']
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "### BROU Health Monitor Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ steps.brou_check.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Data Count:** ${{ steps.brou_check.outputs.data_count || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Age:** ${{ steps.brou_check.outputs.age_minutes || 'N/A' }} minutes" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.brou_check.outputs.status }}" = "error" ]; then
            echo "**❌ Status:** FAILED" >> $GITHUB_STEP_SUMMARY
            echo "**Error Type:** ${{ steps.brou_check.outputs.error_type }}" >> $GITHUB_STEP_SUMMARY
            echo "**Details:** ${{ steps.brou_check.outputs.response_body && 'Response available' || 'No response details' }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.brou_check.outputs.status }}" = "warning" ]; then
            echo "**⚠️ Status:** WARNING" >> $GITHUB_STEP_SUMMARY
            echo "**Issue:** Data is stale (age: ${{ steps.brou_check.outputs.age_minutes }} min, max: ${{ steps.brou_check.outputs.max_age }} min)" >> $GITHUB_STEP_SUMMARY
          else
            echo "**✅ Status:** HEALTHY" >> $GITHUB_STEP_SUMMARY
            echo "**Data Status:** ${{ steps.brou_check.outputs.data_count }} currencies available" >> $GITHUB_STEP_SUMMARY
          fi
