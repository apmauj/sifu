name: BROU Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
      # Controlado por vars.ENABLE_BROU_MONITOR (default: disabled)
  workflow_dispatch:
    inputs:
      fail_on_empty:
        description: 'Fallar si BROU data está vacía'
        required: false
        default: true
        type: boolean
      max_age_minutes:
        description: 'Edad máxima permitida en minutos'
        required: false
        default: 60
        type: number
      issue_failure_threshold:
        description: 'Fallos consecutivos antes de crear issue'
        required: false
        default: 3
        type: number

permissions:
  contents: read
  issues: write  # Para crear issues si hay problemas

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: brou-health-monitor
  cancel-in-progress: true

jobs:
  monitor-brou:
    if: ${{ vars.ENABLE_BROU_MONITOR == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check BROU Health
        id: brou_check
        run: |
          # Configuration
          FAIL_ON_EMPTY="${{ github.event.inputs.fail_on_empty }}"
          [ -z "$FAIL_ON_EMPTY" ] && FAIL_ON_EMPTY="true"
          MAX_AGE="${{ github.event.inputs.max_age_minutes }}"
          [ -z "$MAX_AGE" ] && MAX_AGE="60"
          BROU_ENDPOINT="${{ secrets.VITE_PUBLIC_API_URL }}/brou/current?full=true"
          
          echo "Configuration:"
          echo "- FAIL_ON_EMPTY: $FAIL_ON_EMPTY"
          echo "- MAX_AGE_MINUTES: $MAX_AGE"
          echo "- BROU_ENDPOINT: $BROU_ENDPOINT"
          
          # Make request to BROU endpoint
          echo "Querying BROU endpoint in production..."
          HTTP_STATUS=0
          BODY=""
          
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 "$BROU_ENDPOINT" 2>/dev/null) || true
          HTTP_STATUS=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_STATUS"
          
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 500 ] 2>/dev/null; then
            echo "ERROR: BROU endpoint returned HTTP $HTTP_STATUS"
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "error_type=http_error" >> "$GITHUB_OUTPUT"
            echo "http_status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          # Parse JSON response
          DATA_COUNT=$(echo "$BODY" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              dl = data.get('data', [])
              print(len(dl) if dl else 0)
          except: print(0)
          " 2>/dev/null || echo 0)
          
          TIMESTAMP=$(echo "$BODY" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              print(data.get('timestamp', ''))
          except: print('')
          " 2>/dev/null || echo "")
          
          echo "BROU Data Count: $DATA_COUNT"
          echo "Timestamp: $TIMESTAMP"
          echo "data_count=$DATA_COUNT" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"
          
          # Check for empty data
          if [ "$DATA_COUNT" -eq 0 ] && [ "$FAIL_ON_EMPTY" = "true" ]; then
            echo "ERROR: BROU returned 0 currencies (empty data)"
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "error_type=empty_data" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          # Check data freshness if timestamp available
          if [ -n "$TIMESTAMP" ]; then
            AGE_MINUTES=$(python3 -c "
          from datetime import datetime, timezone
          try:
              dt = datetime.fromisoformat('$TIMESTAMP'.replace('Z','+00:00'))
              age = int((datetime.now(timezone.utc) - dt).total_seconds() / 60)
              print(age)
          except: print(-1)
          " 2>/dev/null || echo -1)
            
            echo "Data is $AGE_MINUTES minutes old"
            echo "age_minutes=$AGE_MINUTES" >> "$GITHUB_OUTPUT"
            
            if [ "$AGE_MINUTES" -gt "$MAX_AGE" ] 2>/dev/null; then
              echo "WARNING: Data is older than $MAX_AGE minutes ($AGE_MINUTES minutes)"
              echo "status=warning" >> "$GITHUB_OUTPUT"
              echo "max_age=$MAX_AGE" >> "$GITHUB_OUTPUT"
            else
              echo "Data is fresh ($AGE_MINUTES minutes)"
              echo "status=success" >> "$GITHUB_OUTPUT"
              echo "max_age=$MAX_AGE" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No timestamp available to check freshness"
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "age_minutes=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue on Failure
        if: failure() && steps.brou_check.outputs.status == 'error'
        uses: actions/github-script@v9
        with:
          script: |
            const thresholdInput = '${{ github.event.inputs.issue_failure_threshold }}';
            const thresholdParsed = Number.parseInt(thresholdInput || '3', 10);
            const threshold = Number.isNaN(thresholdParsed) ? 3 : Math.max(1, thresholdParsed);

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'brou-health-monitor.yml',
              status: 'completed',
              per_page: 20
            });

            let previousConsecutiveFailures = 0;
            for (const run of runsResp.data.workflow_runs) {
              if (run.id === context.runId) continue;
              if (['failure', 'timed_out', 'action_required'].includes(run.conclusion)) {
                previousConsecutiveFailures += 1;
                continue;
              }
              if (run.conclusion === 'cancelled') {
                continue;
              }
              break;
            }

            const currentFailureStreak = previousConsecutiveFailures + 1;
            if (currentFailureStreak < threshold) {
              core.notice(`Issue skipped: failure streak ${currentFailureStreak}/${threshold}`);
              return;
            }

            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['BROU', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('BROU Health Check Failed')
            );

            if (!existingIssue) {
              const errorType = '${{ steps.brou_check.outputs.error_type }}';
              const httpStatus = '${{ steps.brou_check.outputs.http_status }}';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              
              const bodyLines = [
                '## BROU Health Check Failed',
                '',
                `**Timestamp:** ${new Date().toISOString()}`,
                `**Workflow Run:** [View Details](${runUrl})`,
                '',
                '### Error Details',
                `- **Error Type:** ${errorType}`,
                `- **HTTP Status:** ${httpStatus}`,
                '',
                '### Actions Required',
                '1. Check BROU service status',
                '2. Review backend logs on Render',
                '3. Verify connectivity with BROU source',
                '4. Run manual refresh if needed',
                '',
                '---',
                '_Issue created automatically by BROU Health Monitor_'
              ];
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'BROU Health Check Failed',
                body: bodyLines.join('\n'),
                labels: ['BROU', 'monitoring', 'bug', 'urgent']
              });
            }

      - name: Auto-close Issue on Recovery
        if: always() && steps.brou_check.outputs.status != 'error'
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['BROU', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('BROU Health Check Failed')
            );

            if (!existingIssue) {
              core.info('No open issue to close.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `Recovered automatically at ${new Date().toISOString()}\n\nWorkflow run: ${runUrl}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              state: 'closed'
            });

            core.notice(`Issue #${existingIssue.number} closed by recovery.`);

      - name: Summary
        if: always()
        run: |
          {
            echo "### BROU Health Monitor Summary"
            echo "**Status:** ${{ steps.brou_check.outputs.status }}"
            echo "**Data Count:** ${{ steps.brou_check.outputs.data_count }}"
            echo "**Age:** ${{ steps.brou_check.outputs.age_minutes }} minutes"
            echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          
          STATUS="${{ steps.brou_check.outputs.status }}"
          if [ "$STATUS" = "error" ]; then
            echo "**Status:** FAILED" >> "$GITHUB_STEP_SUMMARY"
            echo "**Error Type:** ${{ steps.brou_check.outputs.error_type }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$STATUS" = "warning" ]; then
            echo "**Status:** WARNING" >> "$GITHUB_STEP_SUMMARY"
            echo "**Issue:** Data is stale (age: ${{ steps.brou_check.outputs.age_minutes }} min, max: ${{ steps.brou_check.outputs.max_age }} min)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Status:** HEALTHY" >> "$GITHUB_STEP_SUMMARY"
            echo "**Data Status:** ${{ steps.brou_check.outputs.data_count }} currencies available" >> "$GITHUB_STEP_SUMMARY"
          fi
