name: BROU Health Monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Cada 30 minutos
      # Controlado por vars.ENABLE_BROU_MONITOR (default: disabled)
  workflow_dispatch:
    inputs:
      fail_on_empty:
        description: 'Fallar si BROU data está vacía'
        required: false
        default: true
        type: boolean
      max_age_minutes:
        description: 'Edad máxima permitida en minutos'
        required: false
        default: 60
        type: number
      issue_failure_threshold:
        description: 'Fallos consecutivos antes de crear issue'
        required: false
        default: 3
        type: number

permissions:
  contents: read
  issues: write  # Para crear issues si hay problemas

concurrency:
  group: brou-health-monitor
  cancel-in-progress: true

jobs:
  monitor-brou:
    if: ${{ vars.ENABLE_BROU_MONITOR == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check BROU Health
        id: brou_check
        shell: pwsh
        run: |
          # Configurar variables
          $FailOnEmpty = "${{ github.event.inputs.fail_on_empty }}"
          if ([string]::IsNullOrEmpty($FailOnEmpty)) { $FailOnEmpty = "true" }
          $MaxAgeMinutes = "${{ github.event.inputs.max_age_minutes }}"
          if ([string]::IsNullOrEmpty($MaxAgeMinutes)) { $MaxAgeMinutes = "60" }
          $BrouEndpoint = "${{ secrets.VITE_PUBLIC_API_URL }}/api/brou/current?full=true"
          
          Write-Host "Configuración:"
          Write-Host "- FAIL_ON_EMPTY: $FailOnEmpty"
          Write-Host "- MAX_AGE_MINUTES: $MaxAgeMinutes"
          Write-Host "- BROU_ENDPOINT: $BrouEndpoint"
          
          # Hacer request a BROU endpoint
          Write-Host "Consultando BROU endpoint en producción..."
          try {
            $response = Invoke-WebRequest -Uri $BrouEndpoint -UseBasicParsing -TimeoutSec 30
            $HttpStatus = $response.StatusCode
            $Body = $response.Content
          } catch {
            $HttpStatus = if ($_.Exception.Response) { [int]$_.Exception.Response.StatusCode } else { 0 }
            $Body = $_.Exception.Message
            Write-Host "❌ ERROR: BROU endpoint retornó HTTP $HttpStatus"
            echo "status=error" >> $env:GITHUB_OUTPUT
            echo "error_type=http_error" >> $env:GITHUB_OUTPUT
            echo "http_status=$HttpStatus" >> $env:GITHUB_OUTPUT
            exit 1
          }
          
          Write-Host "HTTP Status: $HttpStatus"
          
          # Parsear respuesta JSON
          try {
            $data = $Body | ConvertFrom-Json
            $dataList = $data.data
            $DataCount = if ($dataList) { $dataList.Count } else { 0 }
            $Timestamp = $data.timestamp
            
            Write-Host "📊 BROU Data Count: $DataCount"
            Write-Host "🕒 Timestamp: $Timestamp"
            
            echo "data_count=$DataCount" >> $env:GITHUB_OUTPUT
            echo "timestamp=$Timestamp" >> $env:GITHUB_OUTPUT
          } catch {
            Write-Host "❌ ERROR: Falló el parsing de la respuesta JSON"
            echo "status=error" >> $env:GITHUB_OUTPUT
            echo "error_type=json_parse_error" >> $env:GITHUB_OUTPUT
            exit 1
          }
          
          # Verificar si hay datos
          if ($DataCount -eq 0 -and $FailOnEmpty -eq "true") {
            Write-Host "❌ ERROR: BROU retornó 0 monedas (data vacía)"
            echo "status=error" >> $env:GITHUB_OUTPUT
            echo "error_type=empty_data" >> $env:GITHUB_OUTPUT
            exit 1
          }
          
          # Verificar frescura de datos si hay timestamp
          if (![string]::IsNullOrEmpty($Timestamp)) {
            try {
              $DataTime = [DateTime]::Parse($Timestamp).ToUniversalTime()
              $CurrentTime = [DateTime]::UtcNow
              $AgeMinutes = [int]($CurrentTime - $DataTime).TotalMinutes
              
              Write-Host "⏱️  Datos tienen $AgeMinutes minutos de antigüedad"
              echo "age_minutes=$AgeMinutes" >> $env:GITHUB_OUTPUT
              
              if ($AgeMinutes -gt [int]$MaxAgeMinutes) {
                Write-Host "⚠️  ADVERTENCIA: Datos tienen más de $MaxAgeMinutes minutos ($AgeMinutes minutos)"
                echo "status=warning" >> $env:GITHUB_OUTPUT
                echo "max_age=$MaxAgeMinutes" >> $env:GITHUB_OUTPUT
              } else {
                Write-Host "✅ Datos están frescos ($AgeMinutes minutos)"
                echo "status=success" >> $env:GITHUB_OUTPUT
                echo "max_age=$MaxAgeMinutes" >> $env:GITHUB_OUTPUT
              }
            } catch {
              Write-Host "⚠️  No se pudo parsear timestamp: $Timestamp"
              echo "status=warning" >> $env:GITHUB_OUTPUT
              echo "timestamp_error=true" >> $env:GITHUB_OUTPUT
            }
          } else {
            Write-Host "ℹ️  No hay timestamp disponible para verificar frescura"
            echo "status=success" >> $env:GITHUB_OUTPUT
            echo "age_minutes=0" >> $env:GITHUB_OUTPUT
          }

      - name: Create Issue on Failure
        if: failure() && steps.brou_check.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            const thresholdInput = '${{ github.event.inputs.issue_failure_threshold }}';
            const thresholdParsed = Number.parseInt(thresholdInput || '3', 10);
            const threshold = Number.isNaN(thresholdParsed) ? 3 : Math.max(1, thresholdParsed);

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'brou-health-monitor.yml',
              status: 'completed',
              per_page: 20
            });

            let previousConsecutiveFailures = 0;
            for (const run of runsResp.data.workflow_runs) {
              if (run.id === context.runId) continue;
              if (['failure', 'timed_out', 'action_required'].includes(run.conclusion)) {
                previousConsecutiveFailures += 1;
                continue;
              }
              if (run.conclusion === 'cancelled') {
                continue;
              }
              break;
            }

            const currentFailureStreak = previousConsecutiveFailures + 1;
            if (currentFailureStreak < threshold) {
              core.notice(`Issue omitido: racha de fallos ${currentFailureStreak}/${threshold}`);
              return;
            }

            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['BROU', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('BROU Health Check Failed')
            );

            if (!existingIssue) {
              const errorType = '${{ steps.brou_check.outputs.error_type }}';
              const httpStatus = '${{ steps.brou_check.outputs.http_status }}';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              
              const bodyLines = [
                '## ❌ BROU Health Check Failed',
                '',
                `**Timestamp:** ${new Date().toISOString()}`,
                `**Workflow Run:** [View Details](${runUrl})`,
                '',
                '### Error Details',
                `- **Error Type:** ${errorType}`,
                `- **HTTP Status:** ${httpStatus}`,
                '',
                '### Actions Required',
                '1. Verificar estado del servicio BROU',
                '2. Revisar logs del backend',
                '3. Verificar conectividad con fuente BROU',
                '4. Ejecutar refresh manual si es necesario',
                '',
                '---',
                '_Issue created automatically by BROU Health Monitor_'
              ];
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 BROU Health Check Failed',
                body: bodyLines.join('\n'),
                labels: ['BROU', 'monitoring', 'bug', 'urgent']
              });
            }

      - name: Auto-close Issue on Recovery
        if: always() && steps.brou_check.outputs.status == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['BROU', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('BROU Health Check Failed')
            );

            if (!existingIssue) {
              core.info('No hay issue abierto para cerrar.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `✅ Recuperado automáticamente en ${new Date().toISOString()}\n\nWorkflow run: ${runUrl}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              state: 'closed'
            });

            core.notice(`Issue #${existingIssue.number} cerrado por recuperación.`);

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          $lines = @()
          $lines += "### BROU Health Monitor Summary"
          $lines += "**Status:** ${{ steps.brou_check.outputs.status }}"
          $lines += "**Data Count:** ${{ steps.brou_check.outputs.data_count }}"
          $lines += "**Age:** ${{ steps.brou_check.outputs.age_minutes }} minutes"
          $lines += "**Timestamp:** $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')"
          $lines += ""
          
          $status = "${{ steps.brou_check.outputs.status }}"
          if ($status -eq "error") {
            $lines += "**❌ Status:** FAILED"
            $lines += "**Error Type:** ${{ steps.brou_check.outputs.error_type }}"
          } elseif ($status -eq "warning") {
            $lines += "**⚠️ Status:** WARNING"
            $lines += "**Issue:** Data is stale (age: ${{ steps.brou_check.outputs.age_minutes }} min, max: ${{ steps.brou_check.outputs.max_age }} min)"
          } else {
            $lines += "**✅ Status:** HEALTHY"
            $lines += "**Data Status:** ${{ steps.brou_check.outputs.data_count }} currencies available"
          }
          
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
