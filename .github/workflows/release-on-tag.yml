name: Release on Tag

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create or update release for (example: v1.2.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build release notes
        id: notes
        run: |
          TAG="${{ inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.ref_name }}"
          fi
          
          if [ -z "$TAG" ] || [[ ! "$TAG" =~ ^v ]]; then
            echo "Invalid tag value: '$TAG'"
            exit 1
          fi
          
          # Get tag message
          TAG_MESSAGE=$(git for-each-ref "refs/tags/$TAG" --format="%(contents)" 2>/dev/null | head -1 || true)
          
          if [ -z "$TAG_MESSAGE" ]; then
            TAG_MESSAGE=$(git tag -l --format='%(contents:subject)' "$TAG" 2>/dev/null | head -1 || true)
          fi
          
          # Extract summary (first non-empty line)
          SUMMARY=$(echo "$TAG_MESSAGE" | grep -v '^\s*$' | head -1 | sed 's/^[[:space:]]*//')
          if [ -z "$SUMMARY" ]; then
            SUMMARY="Automated release generated from tag $TAG."
          fi
          
          # Strip accents for ASCII-safe summary
          SUMMARY=$(echo "$SUMMARY" | iconv -f utf-8 -t ascii//TRANSLIT//IGNORE 2>/dev/null || echo "$SUMMARY")
          
          # Extract changelog section if available
          INCLUDED_ITEMS=""
          if [ -f CHANGELOG.md ]; then
            # Extract section for this tag
            SECTION=$(sed -n "/^###\s*${TAG}/,/^###\s*v[0-9]/p" CHANGELOG.md | head -n -1 | grep -E '^[-*]\s+' | sed 's/^[-*]\s*//' | head -8)
            if [ -n "$SECTION" ]; then
              INCLUDED_ITEMS="$SECTION"
            fi
          fi
          
          # Build release notes
          {
            echo "### Summary"
            echo "$SUMMARY"
            echo ""
            echo "### Included"
            if [ -n "$INCLUDED_ITEMS" ]; then
              echo "$INCLUDED_ITEMS" | while IFS= read -r item; do
                [ -n "$item" ] && echo "- $item"
              done
            else
              echo "- Automated release generated from tag $TAG."
            fi
          } > "release-notes-${TAG}.md"
          
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "notes_file=release-notes-${TAG}.md" >> "$GITHUB_OUTPUT"

      - name: Upsert release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.notes.outputs.tag }}"
          NOTES_FILE="${{ steps.notes.outputs.notes_file }}"
          
          # Check if this is the latest semver tag
          LATEST_TAG=$(git tag --list "v*" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          IS_LATEST="false"
          if [ "$LATEST_TAG" = "$TAG" ]; then
            IS_LATEST="true"
          fi
          
          # Check if release exists
          if gh release view "$TAG" --repo "${{ github.repository }}" --json tagName > /dev/null 2>&1; then
            if [ "$IS_LATEST" = "true" ]; then
              gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --latest --repo "${{ github.repository }}"
            else
              gh release edit "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --repo "${{ github.repository }}"
            fi
          else
            if [ "$IS_LATEST" = "true" ]; then
              gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --latest --repo "${{ github.repository }}"
            else
              gh release create "$TAG" --title "$TAG" --notes-file "$NOTES_FILE" --repo "${{ github.repository }}"
            fi
          fi
