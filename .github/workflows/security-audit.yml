name: Security Audit
on:
  push:
    branches: [ master ]
    paths:
      - 'requirements*.txt'
      - 'frontend/package.json'
      - '.github/workflows/security-audit.yml'
      - '**/*.py'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      backend-fail-on:
        description: 'Backend severidad mínima para fallar (critical|high|medium|low|none)'
        required: false
        default: 'none'

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  backend-pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install deps
        run: |
          # Actualizar pip y setuptools para evitar vulnerabilidades conocidas (PYSEC-2022-43012, PYSEC-2025-49)
          python -m pip install --upgrade pip 'setuptools>=78.1.1'
          pip install -r requirements.txt || true
          [ -f requirements-dev.txt ] && pip install -r requirements-dev.txt
          pip install --upgrade pip-audit
      - name: pip-audit (requirements)
        id: audit_files
        run: |
          set +e
          exit_code=0
          pip-audit -r requirements-core.txt -r requirements-dev.txt -r requirements.txt -f json > pip_audit_requirements.json || exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
      - name: pip-audit (installed)
        id: audit_installed
        run: |
          set +e
          exit_code=0
          pip-audit -l -f json > pip_audit_installed.json || exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
      - name: Evaluar severidad y decidir
        env:
          THRESHOLD: ${{ github.event.inputs.backend-fail-on || 'high' }}
        run: |
          echo "Umbral de fallo (backend): $THRESHOLD"
          # Mapear severidades a números para comparar
          sev_rank() {
            case "${1,,}" in
              critical) echo 5;;
              high) echo 4;;
              medium) echo 3;;
              low) echo 2;;
              none) echo 1;;
              *) echo 0;;
            esac
          }

          threshold_num=$(sev_rank "$THRESHOLD")
          [ -z "$threshold_num" ] && threshold_num=4
          # Construir lista plana de vulnerabilidades (puede estar vacía si jq no existe)
          if command -v jq >/dev/null 2>&1; then
            jq -s '[ .[] | .[] | . as $pkg | (.vulns // [])[] | {package: $pkg.name, id: .id, severity: ((.severity.value // .severity // "unknown") | ascii_downcase), fix_versions: (.fix_versions // []) } ]' \
              pip_audit_requirements.json pip_audit_installed.json > backend_vulns_flat.json 2>/dev/null || echo '[]' > backend_vulns_flat.json
          else
            echo '[]' > backend_vulns_flat.json
          fi

          total=$(grep -o '"id"' backend_vulns_flat.json | wc -l | tr -d ' ')
          fail_count=0
            # Extraer severidades y contar las que superan el umbral
          if [ "$total" -gt 0 ]; then
            if command -v jq >/dev/null 2>&1; then
              while read -r sev; do
                rank=$(sev_rank "$sev")
                [ "$rank" -ge "$threshold_num" ] && fail_count=$((fail_count+1))
              done < <(jq -r '.[].severity' backend_vulns_flat.json)
            fi
          fi
          echo "Total vulnerabilidades detectadas: $total"
          echo "Vulnerabilidades >= umbral: $fail_count"

          echo "### Backend pip-audit" >> $GITHUB_STEP_SUMMARY
          echo "Umbral: $THRESHOLD" >> $GITHUB_STEP_SUMMARY
          echo "Total: $total" >> $GITHUB_STEP_SUMMARY
          echo ">= Umbral: $fail_count" >> $GITHUB_STEP_SUMMARY
          if [ "$fail_count" -gt 0 ]; then
            echo "Backend: FAIL ($fail_count con severidad >= $THRESHOLD)" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "Backend: PASS (sin vulnerabilidades >= $THRESHOLD)" >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pip-audit-json
          path: |
            pip_audit_requirements.json
            pip_audit_installed.json
            backend_vulns_flat.json

  frontend-npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit (prod)
        id: audit
        run: |
          set +e
          exit_code=0
          npm audit --omit=dev --json > audit.prod.json || exit_code=$?
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          npm audit --json > audit.all.json || true
      - name: Fail on High/Critical
        run: |
          node -e "const fs=require('fs');if(!fs.existsSync('audit.prod.json'))process.exit(0);const d=JSON.parse(fs.readFileSync('audit.prod.json','utf8'));const vulns=Object.values(d.vulnerabilities||{});const hc=vulns.filter(v=>['high','critical'].includes(v.severity));if(hc.length){console.error('FAIL '+hc.length+' High/Critical');process.exit(1);}console.log('Frontend PASS sin High/Critical');"
          echo "Frontend: PASS (sin High/Critical)" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit-json
          path: frontend/audit*.json
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs: [ backend-pip-audit, frontend-npm-audit ]
    steps:
      - run: |
          echo "### Security Audit Workflow" >> $GITHUB_STEP_SUMMARY
          echo "Backend: ${{ needs.backend-pip-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Frontend: ${{ needs.frontend-npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-pip-audit.result }}" != "success" ] || [ "${{ needs.frontend-npm-audit.result }}" != "success" ]; then
            exit 1
          fi
          echo "Todo OK" >> $GITHUB_STEP_SUMMARY
