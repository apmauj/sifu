name: Security Audit
on:
  push:
    branches: [ master ]
    paths:
      - 'requirements*.txt'
      - 'frontend/package.json'
      - '.github/workflows/security-audit.yml'
      - '**/*.py'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      backend-fail-on:
        description: 'Backend severidad minima para fallar (critical|high|medium|low|none)'
        required: false
        default: 'none'

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  backend-pip-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install deps
        run: |
          python -m pip install --upgrade pip 'setuptools>=78.1.1'
          pip install -r requirements.txt 2>/dev/null || true
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt 2>/dev/null || true; fi
          pip install --upgrade pip-audit
      
      - name: pip-audit (requirements)
        id: audit_files
        run: |
          python -m pip_audit -r requirements-core.txt -r requirements-dev.txt -r requirements.txt -f json > pip_audit_requirements.json 2>/dev/null || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0
      
      - name: pip-audit (installed)
        id: audit_installed
        run: |
          python -m pip_audit -l -f json > pip_audit_installed.json 2>/dev/null || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0
      
      - name: Evaluate severity
        env:
          THRESHOLD: ${{ github.event.inputs.backend-fail-on || 'high' }}
        run: |
          THRESHOLD="${THRESHOLD:-high}"
          echo "Failure threshold (backend): $THRESHOLD"
          
          # Parse vulnerabilities and check severity
          FAIL_COUNT=$(python3 -c "
          import json, sys
          threshold_rank = {'critical': 5, 'high': 4, 'medium': 3, 'low': 2, 'none': 1}
          target = threshold_rank.get('$THRESHOLD'.lower(), 4)
          total = 0
          fail = 0
          for f in ['pip_audit_requirements.json', 'pip_audit_installed.json']:
              try:
                  data = json.load(open(f))
                  pkgs = data.get('dependencies', data) if isinstance(data, dict) else data
                  if isinstance(pkgs, dict): pkgs = pkgs.values()
                  for pkg in (pkgs if isinstance(pkgs, list) else [pkgs]):
                      vulns = pkg.get('vulns', []) if isinstance(pkg, dict) else []
                      for v in vulns:
                          sev = v.get('severity', {})
                          if isinstance(sev, dict): sev = sev.get('value', '')
                          sev = str(sev).lower()
                          if sev not in threshold_rank: sev = 'unknown'
                          total += 1
                          if threshold_rank.get(sev, 0) >= target: fail += 1
              except: pass
          print(fail)
          " 2>/dev/null || echo 0)
          
          echo "Total vulnerabilities >= threshold: $FAIL_COUNT"
          
          {
            echo "### Backend pip-audit"
            echo "Threshold: $THRESHOLD"
            echo "Vulnerabilities >= threshold: $FAIL_COUNT"
          } >> "$GITHUB_STEP_SUMMARY"
          
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "Backend: FAIL ($FAIL_COUNT with severity >= $THRESHOLD)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "Backend: PASS (no vulnerabilities >= $THRESHOLD)" >> "$GITHUB_STEP_SUMMARY"
          fi
      
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-pip-audit-json
          path: |
            pip_audit_requirements.json
            pip_audit_installed.json

  frontend-npm-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci --ignore-scripts
      
      - name: npm audit (prod)
        id: audit
        run: |
          npm audit --omit=dev --json > audit.prod.json 2>/dev/null || true
          npm audit --json > audit.all.json 2>/dev/null || true
          exit 0
      
      - name: Fail on High/Critical
        run: |
          if [ ! -f audit.prod.json ]; then
            echo "No audit file found, skipping"
            exit 0
          fi
          
          HC=$(node -e "
            try {
              const a = require('./audit.prod.json');
              let c = 0;
              if (a.vulnerabilities) Object.values(a.vulnerabilities).forEach(v => { if (v.severity==='high'||v.severity==='critical') c++; });
              console.log(c);
            } catch { console.log(0); }
          " 2>/dev/null || echo 0)
          
          if [ "$HC" -gt 0 ]; then
            echo "FAIL: $HC High/Critical vulnerabilities found"
            echo "Frontend: FAIL ($HC High/Critical)" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          echo "Frontend PASS"
          echo "Frontend: PASS (no High/Critical)" >> "$GITHUB_STEP_SUMMARY"
      
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-npm-audit-json
          path: frontend/audit*.json
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs: [ backend-pip-audit, frontend-npm-audit ]
    if: always()
    steps:
      - name: Build Summary
        run: |
          {
            echo "### Security Audit Workflow"
            echo "Backend: ${{ needs.backend-pip-audit.result }}"
            echo "Frontend: ${{ needs.frontend-npm-audit.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
          
          BACKEND="${{ needs.backend-pip-audit.result }}"
          FRONTEND="${{ needs.frontend-npm-audit.result }}"
          
          if [ "$BACKEND" != "success" ] || [ "$FRONTEND" != "success" ]; then
            echo "**Overall: FAILED**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          
          echo "**Overall: PASS**" >> "$GITHUB_STEP_SUMMARY"
