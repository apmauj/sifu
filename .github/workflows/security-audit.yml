name: Security Audit
on:
  push:
    branches: [ master ]
    paths:
      - 'requirements*.txt'
      - 'frontend/package.json'
      - '.github/workflows/security-audit.yml'
      - '**/*.py'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      backend-fail-on:
        description: 'Backend severidad mínima para fallar (critical|high|medium|low|none)'
        required: false
        default: 'none'

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  backend-pip-audit:
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        shell: pwsh
        run: |
          if (Test-Path ".venv/Scripts/Activate.ps1") { . .venv/Scripts/Activate.ps1 }
          python -m pip install --upgrade pip 'setuptools>=78.1.1'
          pip install -r requirements.txt 2>$null
          if (Test-Path "requirements-dev.txt") { pip install -r requirements-dev.txt 2>$null }
          pip install --upgrade pip-audit
      
      - name: pip-audit (requirements)
        id: audit_files
        shell: pwsh
        run: |
          if (Test-Path ".venv/Scripts/Activate.ps1") { . .venv/Scripts/Activate.ps1 }
          $exitCode = 0
          try {
            pip-audit -r requirements-core.txt -r requirements-dev.txt -r requirements.txt -f json 2>$null | Out-File -FilePath pip_audit_requirements.json -Encoding utf8
          } catch {
            $exitCode = 1
          }
          echo "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
      
      - name: pip-audit (installed)
        id: audit_installed
        shell: pwsh
        run: |
          if (Test-Path ".venv/Scripts/Activate.ps1") { . .venv/Scripts/Activate.ps1 }
          $exitCode = 0
          try {
            pip-audit -l -f json 2>$null | Out-File -FilePath pip_audit_installed.json -Encoding utf8
          } catch {
            $exitCode = 1
          }
          echo "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
      
      - name: Evaluar severidad y decidir
        shell: pwsh
        env:
          THRESHOLD: ${{ github.event.inputs.backend-fail-on || 'high' }}
        run: |
          $Threshold = $env:THRESHOLD
          if ([string]::IsNullOrEmpty($Threshold)) { $Threshold = "high" }
          Write-Host "Umbral de fallo (backend): $Threshold"
          
          # Mapear severidades a números
          function Get-SeverityRank($sev) {
            switch ($sev.ToLower()) {
              "critical" { return 5 }
              "high" { return 4 }
              "medium" { return 3 }
              "low" { return 2 }
              "none" { return 1 }
              default { return 0 }
            }
          }
          
          $thresholdNum = Get-SeverityRank $Threshold
          
          # Parsear vulnerabilidades de ambos archivos
          $vulns = @()
          foreach ($file in @("pip_audit_requirements.json", "pip_audit_installed.json")) {
            if (Test-Path $file) {
              try {
                $content = Get-Content $file -Raw | ConvertFrom-Json
                foreach ($pkg in $content) {
                  foreach ($vuln in $pkg.vulns) {
                    $severity = if ($vuln.severity.value) { $vuln.severity.value } else { $vuln.severity }
                    if ([string]::IsNullOrEmpty($severity)) { $severity = "unknown" }
                    $vulns += @{
                      package = $pkg.name
                      id = $vuln.id
                      severity = $severity.ToLower()
                      fix_versions = $vuln.fix_versions
                    }
                  }
                }
              } catch {
                Write-Host "Warning: Could not parse $file"
              }
            }
          }
          
          # Guardar lista plana para artefactos
          $vulns | ConvertTo-Json -Depth 5 | Out-File -FilePath backend_vulns_flat.json -Encoding utf8
          
          $total = $vulns.Count
          $failCount = 0
          foreach ($v in $vulns) {
            $rank = Get-SeverityRank $v.severity
            if ($rank -ge $thresholdNum) { $failCount++ }
          }
          
          Write-Host "Total vulnerabilidades detectadas: $total"
          Write-Host "Vulnerabilidades >= umbral: $failCount"
          
          # Summary
          $summary = @()
          $summary += "### Backend pip-audit"
          $summary += "Umbral: $Threshold"
          $summary += "Total: $total"
          $summary += ">= Umbral: $failCount"
          
          if ($failCount -gt 0) {
            $summary += "Backend: FAIL ($failCount con severidad >= $Threshold)"
            $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 1
          } else {
            $summary += "Backend: PASS (sin vulnerabilidades >= $Threshold)"
            $summary -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
          }
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pip-audit-json
          path: |
            pip_audit_requirements.json
            pip_audit_installed.json
            backend_vulns_flat.json

  frontend-npm-audit:
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 8
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      
      - name: Install deps
        shell: pwsh
        run: |
          # Use --ignore-scripts to skip husky install (bash syntax incompatible with Windows)
          npm ci --ignore-scripts
      
      - name: npm audit (prod)
        id: audit
        shell: pwsh
        run: |
          $exitCode = 0
          try {
            npm audit --omit=dev --json 2>$null | Out-File -FilePath audit.prod.json -Encoding utf8
          } catch {
            $exitCode = 1
          }
          echo "exit_code=$exitCode" >> $env:GITHUB_OUTPUT
          
          # También audit completo para referencia
          npm audit --json 2>$null | Out-File -FilePath audit.all.json -Encoding utf8
      
      - name: Fail on High/Critical
        shell: pwsh
        run: |
          if (-not (Test-Path "audit.prod.json")) {
            Write-Host "No audit file found, skipping"
            exit 0
          }
          
          try {
            $audit = Get-Content audit.prod.json -Raw | ConvertFrom-Json
            $vulns = @()
            if ($audit.vulnerabilities) {
              foreach ($key in $audit.vulnerabilities.PSObject.Properties.Name) {
                $vulns += $audit.vulnerabilities.$key
              }
            }
            
            $hc = $vulns | Where-Object { $_.severity -in @('high', 'critical') }
            $hcCount = ($hc | Measure-Object).Count
            
            if ($hcCount -gt 0) {
              Write-Host "FAIL: $hcCount High/Critical vulnerabilities found"
              echo "Frontend: FAIL ($hcCount High/Critical)" >> $env:GITHUB_STEP_SUMMARY
              exit 1
            }
            
            Write-Host "Frontend PASS sin High/Critical"
            echo "Frontend: PASS (sin High/Critical)" >> $env:GITHUB_STEP_SUMMARY
          } catch {
            Write-Host "Warning: Could not parse audit.prod.json - $_"
            echo "Frontend: PASS (audit parse warning)" >> $env:GITHUB_STEP_SUMMARY
          }
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-npm-audit-json
          path: frontend/audit*.json
          if-no-files-found: ignore

  summary:
    runs-on: [self-hosted, sifu-local]
    needs: [ backend-pip-audit, frontend-npm-audit ]
    if: always()
    steps:
      - name: Build Summary
        shell: pwsh
        run: |
          $lines = @()
          $lines += "### Security Audit Workflow"
          $lines += "Backend: ${{ needs.backend-pip-audit.result }}"
          $lines += "Frontend: ${{ needs.frontend-npm-audit.result }}"
          
          $backendResult = "${{ needs.backend-pip-audit.result }}"
          $frontendResult = "${{ needs.frontend-npm-audit.result }}"
          
          if ($backendResult -ne "success" -or $frontendResult -ne "success") {
            $lines += "**Overall: FAILED**"
            $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
            exit 1
          }
          
          $lines += "**Overall: PASS** ✅"
          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
