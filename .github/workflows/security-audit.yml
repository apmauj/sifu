name: Security Audit

on:
  push:
    branches: [ master ]
    paths:
      - 'requirements*.txt'
      - 'frontend/package.json'
      - '.github/workflows/security-audit.yml'
      - '**/*.py'
      - 'frontend/**'
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit
  cancel-in-progress: false

jobs:
  backend-pip-audit:
    name: Backend (pip-audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install --upgrade pip-audit
      - name: pip-audit (requirements)
        id: audit_files
        continue-on-error: true
        run: |
          pip-audit -r requirements-core.txt -r requirements-dev.txt -r requirements.txt -f json > pip_audit_requirements.json || exit_code=$? || true
          echo "exit_code=${exit_code:-0}" >> $GITHUB_OUTPUT
      - name: pip-audit (installed)
        id: audit_installed
        continue-on-error: true
        run: |
          pip-audit -l -f json > pip_audit_installed.json || exit_code=$? || true
          echo "exit_code=${exit_code:-0}" >> $GITHUB_OUTPUT
      - name: Decide failure
        run: |
          if [ "${{ steps.audit_files.outputs.exit_code }}" != "0" ] || [ "${{ steps.audit_installed.outputs.exit_code }}" != "0" ]; then
            echo "Backend: FAIL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Backend: PASS" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-pip-audit-json
          path: |
            pip_audit_requirements.json
            pip_audit_installed.json

  frontend-npm-audit:
    name: Frontend (npm audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: npm audit (prod)
        id: audit
        continue-on-error: true
        run: |
          npm audit --omit=dev --json > audit.prod.json || exit_code=$? || true
          echo "exit_code=${exit_code:-0}" >> $GITHUB_OUTPUT
          npm audit --json > audit.all.json || true
      - name: Fail on High/Critical
        run: |
          node <<'NODE'
          const fs=require('fs');
            if(!fs.existsSync('audit.prod.json')) process.exit(0);
            const data=JSON.parse(fs.readFileSync('audit.prod.json','utf8'));
            let high=0,critical=0;
            for(const v of Object.values(data.vulnerabilities||{})){
            if(v.severity==='high') high++; else if(v.severity==='critical') critical++;
            }
            console.log('High:',high,'Critical:',critical);
            if(high+critical>0){ process.exit(1); }
            NODE
                    echo "Frontend: PASS (sin High/Critical)" >> $GITHUB_STEP_SUMMARY
                - uses: actions/upload-artifact@v4
                    if: always()
                    with:
                    name: frontend-npm-audit-json
                    path: frontend/audit*.json

  summary:
    runs-on: ubuntu-latest
    needs: [ backend-pip-audit, frontend-npm-audit ]
    steps:
      - run: |
          echo "### Security Audit Workflow" >> $GITHUB_STEP_SUMMARY
          echo "Backend: ${{ needs.backend-pip-audit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "Frontend: ${{ needs.frontend-npm-audit.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.backend-pip-audit.result }}" != "success" ] || [ "${{ needs.frontend-npm-audit.result }}" != "success" ]; then
            exit 1
          fi
