name: Frontend-Backend Link Check

on:
  schedule:
    - cron: '*/15 * * * *'  # Cada 15 minutos
      # Controlado por vars.ENABLE_LINK_CHECK (default deshabilitado)
  workflow_dispatch:
    inputs:
      check_all_endpoints:
        description: 'Verificar todos los endpoints criticos'
        required: false
        default: false
        type: boolean
      create_issue_on_failure:
        description: 'Crear issue si falla'
        required: false
        default: true
        type: boolean
      issue_failure_threshold:
        description: 'Fallos consecutivos antes de crear issue'
        required: false
        default: 3
        type: number

permissions:
  contents: read
  issues: write

concurrency:
  group: frontend-backend-link-check
  cancel-in-progress: true

jobs:
  check-link:
    if: ${{ vars.ENABLE_LINK_CHECK == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      status: ${{ steps.health_check.outputs.status }}
      http_code: ${{ steps.health_check.outputs.http_code }}
      
    steps:
      - name: Health Check
        id: health_check
        run: |
          API_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          
          if [ -z "$API_URL" ]; then
            echo "ERROR: VITE_PUBLIC_API_URL secret not defined"
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "http_code=0" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          
          # Normalize URL
          API_URL="${API_URL%/}"
          HEALTH_URL="${API_URL}/health/simple"
          FALLBACK_URL="${API_URL}/health"
          
          echo "Checking: $HEALTH_URL"
          
          # Primary health check
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$HEALTH_URL" 2>/dev/null) || HTTP_CODE=0
          
          # Fallback if primary fails
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 500 ] 2>/dev/null; then
            echo "Primary endpoint failed (HTTP $HTTP_CODE), trying fallback..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$FALLBACK_URL" 2>/dev/null) || HTTP_CODE=0
          fi
          
          echo "HTTP Status: $HTTP_CODE"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 500 ] 2>/dev/null; then
            echo "Link check OK"
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "Link check FAILED"
            echo "status=error" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Check Additional Endpoints
        if: github.event.inputs.check_all_endpoints == 'true'
        id: extra_checks
        run: |
          API_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          API_URL="${API_URL%/}"
          
          ENDPOINTS=("/exchange-rate/latest" "/ui/latest" "/ur/latest")
          FAILED=0
          
          for endpoint in "${ENDPOINTS[@]}"; do
            URL="${API_URL}${endpoint}"
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" 2>/dev/null) || CODE=0
            echo "$endpoint: HTTP $CODE"
            if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 500 ] 2>/dev/null; then
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo "extra_failed=$FAILED" >> "$GITHUB_OUTPUT"
          if [ "$FAILED" -gt 0 ]; then
            echo "$FAILED additional endpoints failed"
          fi

      - name: Create Issue on Failure
        if: failure() && steps.health_check.outputs.status == 'error' && github.event.inputs.create_issue_on_failure == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const thresholdInput = '${{ github.event.inputs.issue_failure_threshold }}';
            const thresholdParsed = Number.parseInt(thresholdInput || '3', 10);
            const threshold = Number.isNaN(thresholdParsed) ? 3 : Math.max(1, thresholdParsed);

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'frontend-backend-link-check.yml',
              status: 'completed',
              per_page: 20
            });

            let previousConsecutiveFailures = 0;
            for (const run of runsResp.data.workflow_runs) {
              if (run.id === context.runId) continue;
              if (['failure', 'timed_out', 'action_required'].includes(run.conclusion)) {
                previousConsecutiveFailures += 1;
                continue;
              }
              if (run.conclusion === 'cancelled') continue;
              break;
            }

            const currentFailureStreak = previousConsecutiveFailures + 1;
            if (currentFailureStreak < threshold) {
              core.notice(`Issue skipped: failure streak ${currentFailureStreak}/${threshold}`);
              return;
            }

            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['link-check', 'monitoring'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('Frontend-Backend Link Check Failed')
            );

            if (!existingIssue) {
              const httpCode = '${{ steps.health_check.outputs.http_code }}';
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              
              const body = [
                '## Frontend-Backend Link Check Failed',
                '',
                `**Timestamp:** ${new Date().toISOString()}`,
                `**Workflow Run:** [View Details](${runUrl})`,
                `**HTTP Status:** ${httpCode}`,
                '',
                '### Actions',
                '1. Check Render backend status',
                '2. Verify VITE_PUBLIC_API_URL secret',
                '3. Check Render logs for errors',
                '',
                '---',
                '_Issue created automatically by Frontend-Backend Link Check_'
              ].join('\n');
              
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Frontend-Backend Link Check Failed',
                body,
                labels: ['link-check', 'monitoring', 'bug']
              });
            }

      - name: Auto-close Issue on Recovery
        if: always() && steps.health_check.outputs.status != 'error'
        uses: actions/github-script@v9
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['link-check', 'monitoring'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('Frontend-Backend Link Check Failed')
            );

            if (!existingIssue) {
              core.info('No open issue to close.');
              return;
            }

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              body: `Recovered automatically at ${new Date().toISOString()}\n\nWorkflow run: ${runUrl}`
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existingIssue.number,
              state: 'closed'
            });

            core.notice(`Issue #${existingIssue.number} closed by recovery.`);

      - name: Summary
        if: always()
        run: |
          STATUS="${{ steps.health_check.outputs.status }}"
          HTTP_CODE="${{ steps.health_check.outputs.http_code }}"
          
          {
            echo "### Frontend-Backend Link Check"
            echo "**Status:** $STATUS"
            echo "**HTTP Code:** $HTTP_CODE"
            echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_STEP_SUMMARY"
