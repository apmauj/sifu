name: Frontend-Backend Link Check

on:
  schedule:
    - cron: '*/15 * * * *'  # Cada 15 minutos
  workflow_dispatch:
    inputs:
      check_all_endpoints:
        description: 'Verificar todos los endpoints críticos'
        required: false
        default: false
        type: boolean
      create_issue_on_failure:
        description: 'Crear issue si falla'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  issues: write  # Para crear issues si hay problemas
  actions: write  # Para disparar workflow de recuperación de túnel

concurrency:
  group: frontend-backend-link-check
  cancel-in-progress: true

jobs:
  check-tunnel-url:
    runs-on: [self-hosted, sifu-local]
    timeout-minutes: 2
    outputs:
      tunnel_changed: ${{ steps.url_check.outputs.tunnel_changed }}
      current_url: ${{ steps.url_check.outputs.current_url }}
      secret_created: ${{ steps.url_check.outputs.secret_created }}
      
    steps:
      - name: Check Current Tunnel URL
        id: url_check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Verificar que GH_PAT está configurado
          if ([string]::IsNullOrEmpty($env:GH_TOKEN)) {
            Write-Host "⚠️  GH_PAT no configurado - no se puede crear/actualizar secrets automáticamente"
            Write-Host "   Para habilitar auto-recovery, configura GH_PAT en Settings > Secrets"
            echo "secret_created=false" >> $env:GITHUB_OUTPUT
            echo "tunnel_changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          
          $StoredUrl = "${{ secrets.VITE_PUBLIC_API_URL }}"
          Write-Host "🔍 Verificando URL del túnel..."
          Write-Host "URL almacenada: $StoredUrl"
          
          # Obtener URL actual de logs de Docker primero
          $CurrentUrl = $null
          try {
            $logs = docker logs sifu-tunnel 2>&1 | Select-String -Pattern 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' | Select-Object -Last 1
            if ($logs) {
              $CurrentUrl = $logs.Matches[0].Value
              Write-Host "URL actual del túnel: $CurrentUrl"
            }
          } catch {
            Write-Host "⚠️  Error al obtener URL del túnel: $_"
          }
          
          # Si el secret está vacío pero tenemos URL del túnel, crear el secret automáticamente
          if ([string]::IsNullOrWhiteSpace($StoredUrl) -and $CurrentUrl) {
            Write-Host "⚠️  Secret VITE_PUBLIC_API_URL está vacío - creando automáticamente..."
            try {
              echo $CurrentUrl | gh secret set VITE_PUBLIC_API_URL -R '${{ github.repository }}'
              Write-Host "✅ Secret VITE_PUBLIC_API_URL creado con URL: $CurrentUrl"
              echo "secret_created=true" >> $env:GITHUB_OUTPUT
              echo "tunnel_changed=true" >> $env:GITHUB_OUTPUT
              echo "current_url=$CurrentUrl" >> $env:GITHUB_OUTPUT
              exit 0
            } catch {
              Write-Host "❌ Error al crear secret: $_"
              echo "secret_created=false" >> $env:GITHUB_OUTPUT
            }
          }
          
          echo "secret_created=false" >> $env:GITHUB_OUTPUT
          
          # Solo verificar si es túnel Cloudflare
          if ($StoredUrl -notmatch 'trycloudflare\.com') {
            Write-Host "ℹ️  No es túnel Cloudflare, saltando"
            echo "tunnel_changed=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          
          # Comparar URLs si ya tenemos la actual
          if ($CurrentUrl) {
            if ($StoredUrl -ne $CurrentUrl) {
              Write-Host "🔄 URLs NO coinciden - actualización requerida"
              echo "tunnel_changed=true" >> $env:GITHUB_OUTPUT
              echo "current_url=$CurrentUrl" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "✅ URLs coinciden"
              echo "tunnel_changed=false" >> $env:GITHUB_OUTPUT
            }
          } else {
            Write-Host "⚠️  No se pudo obtener URL del túnel"
            echo "tunnel_changed=unknown" >> $env:GITHUB_OUTPUT
          }

  check-connection:
    runs-on: ubuntu-latest
    needs: check-tunnel-url
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check Frontend Accessibility
        id: frontend_check
        run: |
          FRONTEND_URL="https://${{ github.repository_owner }}.github.io/sifu"
          
          echo "🌐 Verificando Frontend en: $FRONTEND_URL"
          
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -L "$FRONTEND_URL")
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1 | cut -d: -f2)
          
          echo "frontend_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ ERROR: Frontend no accesible (HTTP $HTTP_STATUS)"
            echo "frontend_accessible=false" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "✅ Frontend accesible"
            echo "frontend_accessible=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine Active Backend URL
        id: backend_url
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SECRET_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          CURRENT_URL="${{ needs.check-tunnel-url.outputs.current_url }}"

          # Si no hay URL en secret ni en logs, dispara actualización de túnel y cancela
          if [ -z "$SECRET_URL" ] && [ -z "$CURRENT_URL" ]; then
            echo "⚠️  VITE_PUBLIC_API_URL vacío y sin URL detectada; intentando regenerar túnel..."

            TOKEN="$GH_PAT"
            if [ -z "$TOKEN" ]; then
              TOKEN="$GITHUB_TOKEN"
            fi

            echo "resolved_url=" >> $GITHUB_OUTPUT
            echo "url_source=missing" >> $GITHUB_OUTPUT

            if [ -n "$TOKEN" ]; then
              export GH_TOKEN="$TOKEN"
              if gh workflow run ".github/workflows/update-tunnel.yml" -R "${{ github.repository }}" --ref "${{ github.ref_name }}"; then
                echo "recovery_triggered=true" >> $GITHUB_OUTPUT
                echo "ℹ️  Workflow de recuperación disparado"
              else
                echo "recovery_triggered=false" >> $GITHUB_OUTPUT
                echo "❌ No se pudo disparar el workflow de recuperación"
              fi
            else
              echo "recovery_triggered=false" >> $GITHUB_OUTPUT
              echo "⚠️  GH_TOKEN no disponible; no se pudo disparar recuperación"
            fi

            exit 1
          fi

          RESOLVED_URL="$SECRET_URL"
          SOURCE="secret"

          if [ -n "$CURRENT_URL" ]; then
            RESOLVED_URL="$CURRENT_URL"
            SOURCE="tunnel_logs"
          fi

          echo "🔗 URL backend activa: $RESOLVED_URL (origen: $SOURCE)"
          echo "resolved_url=$RESOLVED_URL" >> $GITHUB_OUTPUT
          echo "url_source=$SOURCE" >> $GITHUB_OUTPUT

      - name: Check Backend Health Endpoint
        id: backend_check
        continue-on-error: true
        run: |
          BACKEND_URL="${{ steps.backend_url.outputs.resolved_url }}"
          HEALTH_ENDPOINT="$BACKEND_URL/api/health"
          
          echo "🔧 Verificando Backend en: $HEALTH_ENDPOINT"

          DELAYS=(30 60 90 120 180)
          ATTEMPTS=${#DELAYS[@]}
          SUCCESS=false
          HTTP_STATUS=0
          BODY=""

          for idx in "${!DELAYS[@]}"; do
            i=$((idx+1))
            RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" "$HEALTH_ENDPOINT" || echo "CURL_FAILED")

            if echo "$RESPONSE" | grep -q "CURL_FAILED"; then
              echo "❌ ERROR: Curl falló completamente (intento $i/$ATTEMPTS)"
            else
              BODY=$(echo "$RESPONSE" | head -n -1)
              HTTP_STATUS=$(echo "$RESPONSE" | tail -n 1 | cut -d: -f2)

              if [ "$HTTP_STATUS" = "200" ]; then
                SUCCESS=true
                break
              else
                echo "❌ ERROR: Backend HTTP $HTTP_STATUS (intento $i/$ATTEMPTS)"
              fi
            fi

            if [ "$i" -lt "$ATTEMPTS" ]; then
              DELAY=${DELAYS[$idx]}
              echo "⏳ Reintentando en ${DELAY}s..."
              sleep $DELAY
            fi
          done

          echo "backend_status=$HTTP_STATUS" >> $GITHUB_OUTPUT

          if [ "$SUCCESS" != "true" ]; then
            echo "backend_accessible=false" >> $GITHUB_OUTPUT
            echo "health_status=down" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Backend responde correctamente"
          echo "backend_accessible=true" >> $GITHUB_OUTPUT

          STATUS=$(echo "$BODY" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(data.get('status', 'unknown'))
          except:
              print('error')
          " 2>/dev/null || echo "parse_error")

          echo "health_status=$STATUS" >> $GITHUB_OUTPUT
          
          if [ "$STATUS" != "healthy" ]; then
            echo "⚠️  WARNING: Backend health status: $STATUS"
          fi

      - name: Check if Tunnel URL Changed
        id: tunnel_url_check
        run: |
          TUNNEL_CHANGED="${{ needs.check-tunnel-url.outputs.tunnel_changed }}"
          CURRENT_URL="${{ needs.check-tunnel-url.outputs.current_url }}"
          
          echo "tunnel_changed=$TUNNEL_CHANGED" >> $GITHUB_OUTPUT
          echo "current_url=$CURRENT_URL" >> $GITHUB_OUTPUT
          
          if [ "$TUNNEL_CHANGED" == "true" ]; then
            echo "⚠️  URL del túnel desactualizada"
            echo "   Secret: ${{ secrets.VITE_PUBLIC_API_URL }}"
            echo "   Actual: $CURRENT_URL"
          elif [ "$TUNNEL_CHANGED" == "unknown" ]; then
            echo "⚠️  No se pudo verificar estado del túnel"
          else
            echo "✅ URL del túnel actualizada"
          fi

      - name: Verify Frontend Can Reach Backend
        id: frontend_backend_integration
        if: steps.backend_check.outputs.backend_accessible == 'true'
        continue-on-error: true
        run: |
          BACKEND_URL="${{ steps.backend_url.outputs.resolved_url }}"
          FRONTEND_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          
          echo "🔗 Verificando que frontend desplegado puede comunicarse con backend..."
          echo "Frontend: $FRONTEND_URL"
          echo "Backend: $BACKEND_URL"
          
          # Verificar que el frontend está accesible (seguir redirecciones de Pages)
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L "$FRONTEND_URL")
          
          if [ "$FRONTEND_STATUS" -ge 200 ] && [ "$FRONTEND_STATUS" -lt 400 ]; then
            echo "✅ Frontend accesible (HTTP $FRONTEND_STATUS)"
          else
            echo "⚠️  Frontend no accesible (HTTP $FRONTEND_STATUS)"
            echo "frontend_backend_ok=unknown" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Intentar hacer una llamada de prueba simulando CORS
          # Verificamos que el backend responda con headers CORS apropiados
          CORS_CHECK=$(curl -s -I \
            -H "Origin: $FRONTEND_URL" \
            -H "Access-Control-Request-Method: GET" \
            "$BACKEND_URL/api/health" | grep -i "access-control-allow-origin" || echo "")
          
          if [ -n "$CORS_CHECK" ]; then
            echo "✅ Backend responde con CORS headers apropiados"
            echo "   $CORS_CHECK"
            echo "frontend_backend_ok=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️  Backend no responde con CORS headers apropiados"
            echo "   Esto puede causar problemas de conectividad desde el frontend"
            echo "frontend_backend_ok=false" >> $GITHUB_OUTPUT
            
            # Si el backend está vivo pero CORS falla, podría necesitar redeploy
            # para asegurar que el frontend tiene la URL correcta compilada
            echo "needs_redeploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Detect Tunnel Failure
        id: tunnel_check
        if: |
          (steps.backend_check.outputs.backend_accessible == 'false' ||
           needs.check-tunnel-url.outputs.tunnel_changed == 'true' ||
           steps.frontend_backend_integration.outputs.frontend_backend_ok == 'false')
        run: |
          BACKEND_URL="${{ steps.backend_url.outputs.resolved_url }}"
          
          if [ "${{ steps.backend_check.outputs.backend_accessible }}" == "false" ]; then
            echo "🔍 Backend no accesible - verificando si es un túnel caído..."
            REASON="backend_down"
          elif [ "${{ needs.check-tunnel-url.outputs.tunnel_changed }}" == "true" ]; then
            echo "🔍 URL del túnel cambió - se requiere actualización..."
            REASON="url_mismatch"
          else
            echo "🔍 Frontend no puede comunicarse con backend - posible URL desactualizada en build..."
            REASON="frontend_backend_mismatch"
          fi
          
          # Detectar si es una URL de Cloudflare Tunnel
          if echo "$BACKEND_URL" | grep -q "trycloudflare.com"; then
            echo "tunnel_detected=true" >> $GITHUB_OUTPUT
            echo "failure_reason=$REASON" >> $GITHUB_OUTPUT
            
            if [ "$REASON" == "backend_down" ]; then
              echo "⚠️  Túnel Cloudflare detectado y caído"
            elif [ "$REASON" == "url_mismatch" ]; then
              echo "⚠️  Túnel Cloudflare URL desactualizada en secret"
            else
              echo "⚠️  Frontend desplegado tiene URL incorrecta compilada"
            fi
            
            echo "tunnel_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          else
            echo "tunnel_detected=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No es un túnel Cloudflare (probablemente backend fijo)"
          fi

      - name: Attempt Tunnel Recovery
        id: tunnel_recovery
        if: steps.tunnel_check.outputs.tunnel_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ github.sha }}
          WORKFLOW_FILE: .github/workflows/update-tunnel.yml
          WORKFLOW_REF: ${{ github.ref_name }}
          WORKFLOW_REPO: ${{ github.repository }}
          RESOLVED_BACKEND_URL: ${{ steps.backend_url.outputs.resolved_url }}
        run: |
          echo "🔄 Intentando recuperar túnel automáticamente..."
          
          if [ -z "$GH_TOKEN" ]; then
            echo "❌ GH_TOKEN no disponible. No se puede disparar la recuperación"
            echo "recovery_attempted=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Disparando actualización de túnel..."
          if ! gh workflow run "$WORKFLOW_FILE" -R "$WORKFLOW_REPO" --ref "$WORKFLOW_REF"; then
            echo "❌ No se pudo disparar el workflow de túnel"
            echo "recovery_attempted=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "recovery_attempted=true" >> $GITHUB_OUTPUT
          echo "recovery_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

          echo "⏳ Buscando run activo de $WORKFLOW_FILE..."
          UPDATE_RUN_ID=""
          for attempt in {1..18}; do
            UPDATE_RUN_ID=$(gh run list --workflow "$WORKFLOW_FILE" --json databaseId,headSha,status -L 10 | \
              jq -r 'map(select(.headSha == env.TARGET_SHA)) | (.[0].databaseId // "")')
            if [ -n "$UPDATE_RUN_ID" ]; then
              break
            fi
            sleep 10
          done

          if [ -z "$UPDATE_RUN_ID" ]; then
            echo "⚠️ No se pudo identificar el run de actualización"
            echo "recovery_successful=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🕘 Esperando a que el workflow ($UPDATE_RUN_ID) termine..."
          if ! gh run watch "$UPDATE_RUN_ID" --interval 15 --exit-status; then
            echo "⚠️ El workflow de actualización falló"
            echo "recovery_successful=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Workflow de actualización completado. Re-validando backend..."
          BACKEND_URL="$RESOLVED_BACKEND_URL"
          HEALTH_ENDPOINT="$BACKEND_URL/api/health"

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_ENDPOINT")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Backend recuperado exitosamente"
            echo "recovery_successful=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Backend aún no responde (HTTP $HTTP_STATUS)"
            echo "recovery_successful=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Critical Endpoints
        id: endpoints_check
        if: |
          steps.backend_check.outputs.backend_accessible == 'true' &&
          (github.event.inputs.check_all_endpoints == 'true' || github.event_name == 'schedule')
        run: |
          BACKEND_URL="${{ steps.backend_url.outputs.resolved_url }}"
          
          # Array de endpoints críticos a verificar
          declare -a ENDPOINTS=(
            "/api/info"
            "/api/ur/info"
            "/api/brou/current"
            "/api/exchange-rate/latest"
          )
          
          FAILED_ENDPOINTS=""
          SUCCESS_COUNT=0
          FAIL_COUNT=0
          
          echo "🔍 Verificando endpoints críticos..."
          
          for endpoint in "${ENDPOINTS[@]}"; do
            URL="$BACKEND_URL$endpoint"
            echo "Probando: $URL"
            
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
            
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "  ✅ $endpoint - OK ($HTTP_STATUS)"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            else
              echo "  ❌ $endpoint - FAILED ($HTTP_STATUS)"
              FAILED_ENDPOINTS="$FAILED_ENDPOINTS\n- $endpoint (HTTP $HTTP_STATUS)"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          done
          
          echo "endpoints_success=$SUCCESS_COUNT" >> $GITHUB_OUTPUT
          echo "endpoints_fail=$FAIL_COUNT" >> $GITHUB_OUTPUT
          echo "failed_endpoints<<EOF" >> $GITHUB_OUTPUT
          echo -e "$FAILED_ENDPOINTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ $FAIL_COUNT -gt 0 ]; then
            echo "❌ $FAIL_COUNT endpoint(s) fallaron"
            exit 1
          else
            echo "✅ Todos los endpoints respondieron correctamente"
          fi

      - name: Test Frontend-Backend Integration
        id: integration_check
        run: |
          BACKEND_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          
          echo "🔗 Verificando integración Frontend-Backend..."
          echo "Backend configurado en: $BACKEND_URL"
          
          # Verificar que la variable de entorno esté configurada
          if [ -z "$BACKEND_URL" ]; then
            echo "❌ ERROR: VITE_PUBLIC_API_URL no está configurada"
            echo "integration_status=error" >> $GITHUB_OUTPUT
            echo "integration_error=Missing VITE_PUBLIC_API_URL" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Verificar que no sea localhost o tunnel temporal
          if echo "$BACKEND_URL" | grep -qE "(localhost|127\.0\.0\.1|trycloudflare\.com)"; then
            echo "⚠️  WARNING: Backend URL parece ser temporal o local: $BACKEND_URL"
            echo "integration_status=warning" >> $GITHUB_OUTPUT
            echo "integration_warning=Backend URL is temporary or local" >> $GITHUB_OUTPUT
          else
            echo "✅ Backend URL es válida"
            echo "integration_status=success" >> $GITHUB_OUTPUT
          fi
          
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT

      - name: Check CORS Configuration
        id: cors_check
        run: |
          BACKEND_URL="${{ secrets.VITE_PUBLIC_API_URL }}"
          FRONTEND_ORIGIN="https://${{ github.repository_owner }}.github.io"
          
          echo "🌍 Verificando configuración CORS..."
          echo "Frontend Origin: $FRONTEND_ORIGIN"
          
          # Hacer request con Origin header
          RESPONSE=$(curl -s -I -H "Origin: $FRONTEND_ORIGIN" "$BACKEND_URL/api/health")
          
          CORS_HEADER=$(echo "$RESPONSE" | grep -i "access-control-allow-origin" || echo "")
          
          if [ -z "$CORS_HEADER" ]; then
            echo "⚠️  WARNING: No se encontró header CORS en la respuesta"
            echo "cors_configured=unknown" >> $GITHUB_OUTPUT
          else
            echo "✅ Header CORS encontrado: $CORS_HEADER"
            echo "cors_configured=true" >> $GITHUB_OUTPUT
            echo "cors_header=$CORS_HEADER" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Failure
        if: failure() && (github.event.inputs.create_issue_on_failure != 'false')
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['frontend-backend-link', 'monitoring', 'bug'],
              state: 'open'
            });

            const existingIssue = data.find(issue =>
              issue.title.includes('Frontend-Backend Connection Failed')
            );

            if (!existingIssue) {
              const frontendStatus = '${{ steps.frontend_check.outputs.frontend_accessible }}';
              const backendStatus = '${{ steps.backend_check.outputs.backend_accessible }}';
              const integrationStatus = '${{ steps.integration_check.outputs.integration_status }}';
              const failedEndpoints = `${{ steps.endpoints_check.outputs.failed_endpoints }}`;
              
              let problemDescription = '';
              if (frontendStatus === 'false') {
                problemDescription = '❌ **Frontend no accesible**';
              } else if (backendStatus === 'false') {
                problemDescription = '❌ **Backend no responde**';
              } else if (failedEndpoints) {
                problemDescription = `❌ **Algunos endpoints fallaron**\n${failedEndpoints}`;
              } else {
                problemDescription = '❌ **Error en la integración**';
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '🚨 Frontend-Backend Connection Failed',
                body: `
                ## ❌ Frontend-Backend Link Check Failed

                **Timestamp:** ${new Date().toISOString()}
                **Workflow Run:** [View Details](${context.payload.workflow_run?.html_url || context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId})

                ### Problem
                ${problemDescription}

                ### Status Details
                - **Frontend Accessible:** ${frontendStatus || 'N/A'}
                - **Backend Accessible:** ${backendStatus || 'N/A'}
                - **Integration Status:** ${integrationStatus || 'N/A'}
                - **Backend Health:** ${'${{ steps.backend_check.outputs.health_status }}' || 'N/A'}

                ### Configuration
                - **Backend URL:** \`${'${{ steps.integration_check.outputs.backend_url }}'}\`
                - **CORS Status:** ${'${{ steps.cors_check.outputs.cors_configured }}' || 'unknown'}

                ### Failed Endpoints
                ${failedEndpoints || 'None checked or all passed'}

                ### Actions Required
                1. Verificar que el backend esté ejecutándose
                2. Verificar configuración de VITE_PUBLIC_API_URL
                3. Revisar configuración CORS del backend
                4. Verificar que GitHub Pages esté activo
                5. Revisar logs del backend para errores

                ### Debug Commands
                \`\`\`bash
                # Verificar frontend
                curl -I https://${context.repo.owner}.github.io/sifu

                # Verificar backend
                curl ${'${{ steps.integration_check.outputs.backend_url }}'}/api/health

                # Verificar CORS
                curl -I -H "Origin: https://${context.repo.owner}.github.io" ${'${{ steps.integration_check.outputs.backend_url }}'}/api/health
                \`\`\`

                ---
                *Issue created automatically by Frontend-Backend Link Check*
                `,
                labels: ['frontend-backend-link', 'monitoring', 'bug', 'urgent']
              });
            }

      - name: Summary
        if: always()
        run: |
          echo "### 🔗 Frontend-Backend Link Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Frontend Status
          if [ "${{ steps.frontend_check.outputs.frontend_accessible }}" = "true" ]; then
            echo "✅ **Frontend:** Accessible (HTTP ${{ steps.frontend_check.outputs.frontend_status }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Frontend:** Not Accessible (HTTP ${{ steps.frontend_check.outputs.frontend_status }})" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Backend Status
          if [ "${{ steps.backend_check.outputs.backend_accessible }}" = "true" ]; then
            echo "✅ **Backend:** Healthy (HTTP ${{ steps.backend_check.outputs.backend_status }})" >> $GITHUB_STEP_SUMMARY
            echo "   - Health Status: ${{ steps.backend_check.outputs.health_status }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Backend:** Not Accessible (HTTP ${{ steps.backend_check.outputs.backend_status }})" >> $GITHUB_STEP_SUMMARY
            
            # Tunnel recovery info
            if [ "${{ steps.tunnel_check.outputs.tunnel_detected }}" = "true" ]; then
              echo "   - 🔍 Túnel Cloudflare detectado: \`${{ steps.tunnel_check.outputs.tunnel_url }}\`" >> $GITHUB_STEP_SUMMARY
              
              if [ "${{ steps.tunnel_recovery.outputs.recovery_attempted }}" = "true" ]; then
                echo "   - 🔄 Recuperación intentada: ${{ steps.tunnel_recovery.outputs.recovery_time }}" >> $GITHUB_STEP_SUMMARY
                
                if [ "${{ steps.tunnel_recovery.outputs.recovery_successful }}" = "true" ]; then
                  echo "   - ✅ Recuperación exitosa" >> $GITHUB_STEP_SUMMARY
                else
                  echo "   - ❌ Recuperación fallida (se requiere intervención manual)" >> $GITHUB_STEP_SUMMARY
                fi
              fi
            fi
          fi
          
          # Integration Status
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Integration Status:** ${{ steps.integration_check.outputs.integration_status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Backend URL:** \`${{ steps.integration_check.outputs.backend_url }}\`" >> $GITHUB_STEP_SUMMARY
          
          # CORS Status
          if [ -n "${{ steps.cors_check.outputs.cors_configured }}" ]; then
            echo "**CORS:** ${{ steps.cors_check.outputs.cors_configured }}" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Endpoints Status
          if [ -n "${{ steps.endpoints_check.outputs.endpoints_success }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Endpoints Check:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Success: ${{ steps.endpoints_check.outputs.endpoints_success }}" >> $GITHUB_STEP_SUMMARY
            echo "- ❌ Failed: ${{ steps.endpoints_check.outputs.endpoints_fail }}" >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ steps.endpoints_check.outputs.endpoints_fail }}" != "0" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Failed Endpoints:**" >> $GITHUB_STEP_SUMMARY
              echo "${{ steps.endpoints_check.outputs.failed_endpoints }}" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          # Overall Status
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.frontend_check.outputs.frontend_accessible }}" = "true" ] && \
             [ "${{ steps.backend_check.outputs.backend_accessible }}" = "true" ]; then
            echo "### ✅ Overall Status: HEALTHY" >> $GITHUB_STEP_SUMMARY
            echo "Frontend y Backend están conectados y funcionando correctamente." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.tunnel_recovery.outputs.recovery_successful }}" = "true" ]; then
            echo "### ✅ Overall Status: RECOVERED" >> $GITHUB_STEP_SUMMARY
            echo "El túnel fue recuperado automáticamente." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Overall Status: DEGRADED" >> $GITHUB_STEP_SUMMARY
            echo "Hay problemas con la conexión Frontend-Backend." >> $GITHUB_STEP_SUMMARY
            
            if [ "${{ steps.tunnel_check.outputs.tunnel_detected }}" = "true" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Acción sugerida:** Ejecutar manualmente el workflow 'Update Cloudflare Tunnel'" >> $GITHUB_STEP_SUMMARY
            fi
          fi
