name: Frontend CI (deprecated)

# Deprecated: replaced by ci-cd.yml. Kept for manual runs only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint and Type Check
        run: npm run lint

      - name: Run Tests (including i18n validation)
        run: npm test -- --run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Summary
        if: always()
        run: |
          echo "### Frontend CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          echo "NPM version: $(npm --version)" >> $GITHUB_STEP_SUMMARY
