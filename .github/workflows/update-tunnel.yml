name: Update Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      trigger_deploy:
        description: 'Disparar redeploy de frontend después de actualizar'
        required: false
        default: false
        type: boolean
      skip_if_unchanged:
        description: 'Saltar si la URL no cambió'
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      trigger_deploy:
        description: 'Disparar redeploy de frontend después de actualizar'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  actions: write

concurrency:
  group: update-cloudflare-tunnel
  cancel-in-progress: true

jobs:
  update-tunnel:
    runs-on: [self-hosted, sifu-local]  # Usar runner local con Docker
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GH_PAT Secret
        id: check_pat
        shell: pwsh
        run: |
          # Verificar que GH_PAT está configurado (necesario para modificar secrets)
          if ([string]::IsNullOrEmpty("${{ secrets.GH_PAT }}")) {
            Write-Host "❌ ERROR: Secret GH_PAT no está configurado"
            Write-Host ""
            Write-Host "Para configurarlo:" -ForegroundColor Yellow
            Write-Host "1. Ve a: https://github.com/settings/tokens?type=beta" -ForegroundColor Cyan
            Write-Host "2. Crea un Fine-grained PAT con:" -ForegroundColor Cyan
            Write-Host "   - Repository access: Only select repositories -> apmauj/sifu" -ForegroundColor DarkCyan
            Write-Host "   - Permissions:" -ForegroundColor DarkCyan
            Write-Host "     * Actions: Read and write" -ForegroundColor DarkCyan
            Write-Host "     * Secrets: Read and write" -ForegroundColor DarkCyan
            Write-Host "     * Workflows: Read and write" -ForegroundColor DarkCyan
            Write-Host "3. Guarda el token como secret GH_PAT en:" -ForegroundColor Cyan
            Write-Host "   https://github.com/apmauj/sifu/settings/secrets/actions" -ForegroundColor Cyan
            echo "pat_valid=false" >> $env:GITHUB_OUTPUT
            exit 1
          }
          Write-Host "✅ Secret GH_PAT encontrado"
          echo "pat_valid=true" >> $env:GITHUB_OUTPUT

      - name: Validate VITE_PUBLIC_API_URL Secret Exists
        id: check_secret
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          Write-Host "🔍 Verificando que el secret VITE_PUBLIC_API_URL existe..."
          $secrets = gh secret list -R '${{ github.repository }}' 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "⚠️ No se pudo listar secrets con gh (continuando): $secrets"
            echo "secret_exists=unknown" >> $env:GITHUB_OUTPUT
            exit 0
          }
          if ($secrets -match 'VITE_PUBLIC_API_URL') {
            Write-Host "✅ Secret VITE_PUBLIC_API_URL encontrado"
            echo "secret_exists=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "⚠️ Secret VITE_PUBLIC_API_URL no existe - se creará automáticamente"
            echo "secret_exists=false" >> $env:GITHUB_OUTPUT
          }

      - name: Update Tunnel using PowerShell Script
        id: update_tunnel
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          Write-Host "🔄 Ejecutando script de actualización de túnel..."
          
          $TriggerDeploy = ('${{ github.event.inputs.trigger_deploy }}' -eq 'true') -or ('${{ inputs.trigger_deploy }}' -eq 'true')
          $SkipIfUnchanged = ('${{ github.event.inputs.skip_if_unchanged }}' -eq 'true')
          
          $params = @{
            Repo = '${{ github.repository }}'
            TriggerDeploy = $TriggerDeploy
            SkipIfUnchanged = $SkipIfUnchanged
          }
          
          & ".\scripts\deploy\update_tunnel_secret.ps1" @params
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host "✅ Túnel actualizado exitosamente"
            echo "success=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Error actualizando túnel"
            echo "success=false" >> $env:GITHUB_OUTPUT
            exit 1
          }

      - name: Summary
        if: always()
        shell: pwsh
        run: |
          echo "### 🌐 Cloudflare Tunnel Update Summary" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(Get-Date -Format 'o')" >> $env:GITHUB_STEP_SUMMARY
          echo "" >> $env:GITHUB_STEP_SUMMARY
          
          if ("${{ steps.update_tunnel.outputs.success }}" -eq "true") {
            echo "✅ **Status:** Túnel actualizado exitosamente" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $env:GITHUB_STEP_SUMMARY
            $triggerDeploy = ('${{ github.event.inputs.trigger_deploy }}' -eq 'true') -or ('${{ inputs.trigger_deploy }}' -eq 'true')
            if ($triggerDeploy) {
              echo "- ⏳ Workflow de deploy frontend disparado automáticamente" >> $env:GITHUB_STEP_SUMMARY
              echo "- 🔍 Verificar [Actions](https://github.com/${{ github.repository }}/actions) para monitorear progreso" >> $env:GITHUB_STEP_SUMMARY
            }
          } else {
            echo "❌ **Status:** Error al actualizar túnel" >> $env:GITHUB_STEP_SUMMARY
            echo "" >> $env:GITHUB_STEP_SUMMARY
            echo "### Next Steps" >> $env:GITHUB_STEP_SUMMARY
            echo "- 📋 Revisa los logs del workflow para más detalles" >> $env:GITHUB_STEP_SUMMARY
            echo "- � Intenta ejecutar manualmente: ``.\scripts\deploy\update_tunnel_secret.ps1 -Repo ${{ github.repository }} -TriggerDeploy``" >> $env:GITHUB_STEP_SUMMARY
          }
