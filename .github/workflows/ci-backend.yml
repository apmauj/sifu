name: Backend CI

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/ci-backend.yml'
      - 'scripts/check_messages.py'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -r requirements.txt

      - name: Static message duplication check
        run: python scripts/check_messages.py

      - name: Run tests
        env:
          PYTHONUNBUFFERED: '1'
        run: |
            pytest -q --maxfail=1

      - name: Summary
        if: always()
        run: |
          echo "### Backend CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Python version: $(python --version)" >> $GITHUB_STEP_SUMMARY
