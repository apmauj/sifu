name: Backend CI

on:
  push:
    branches: [ master ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/ci-backend.yml'
      - 'scripts/util/check_messages.py'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Static message duplication check
        run: python scripts/util/check_messages.py

      - name: Run tests
        env:
          PYTHONUNBUFFERED: '1'
        run: pytest -q --maxfail=1 --disable-warnings

      - name: Summary
        if: always()
        run: |
          echo "### Backend CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Python version: $(python --version)" >> $GITHUB_STEP_SUMMARY
          