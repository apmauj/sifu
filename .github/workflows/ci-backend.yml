name: Backend & Frontend CI (deprecated)

# Deprecated: replaced by ci-cd.yml. Kept for manual runs only.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Static message duplication check
        run: python scripts/util/check_messages.py

      - name: Run tests
        env:
          PYTHONUNBUFFERED: '1'
          SIFU_SKIP_BOOTSTRAP: "1"
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: pytest -q --maxfail=1 --disable-warnings --tb=short

      - name: Clean up before frontend tests
        run: |
          # Clean up any Python-related environment variables that might interfere
          unset PYTHONPATH
          unset PYTHONHOME

      - name: Setup Node.js for Frontend Tests
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package.json'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests (including i18n validation)
        working-directory: frontend
        run: npm test -- --run --reporter=verbose

      - name: Summary
        if: always()
        run: |
          echo "### Backend & Frontend CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "Tests status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Python version: $(python --version)" >> $GITHUB_STEP_SUMMARY
          echo "Node.js version: $(node --version)" >> $GITHUB_STEP_SUMMARY
          