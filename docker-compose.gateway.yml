services:
  # Nginx Reverse Proxy
  nginx-gateway:
    image: nginx:alpine
    container_name: sifu-gateway
    ports:
      - "80:80"
      - "443:443"  # Para HTTPS futuro
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl  # Para certificados SSL futuros
    depends_on:
      - backend
      - frontend
    networks:
      - sifu-network
    restart: unless-stopped

  # Backend - FastAPI (sin puerto expuesto externamente)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sifu-backend
    # ports:  # Comentamos esto para que solo sea accesible via proxy
    #   - "8000:8000"
    volumes:
      - ./data:/app/data
      - .:/app
    environment:
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/ui_data.db
    networks:
      - sifu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - React/Nginx (sin puerto expuesto externamente)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sifu-frontend:latest
    container_name: sifu-frontend
    # ports:  # Comentado para solo exponer por proxy
    #   - "80:80"
    depends_on:
      - backend
    networks:
      - sifu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  ui_data:
    driver: local

networks:
  sifu-network:
    driver: bridge
