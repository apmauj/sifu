[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --cov=.
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-exclude=venv/*
    --cov-exclude=tests/*
    --cov-exclude=__pycache__/*
    --cov-exclude=.venv/*
    --cov-exclude=htmlcov/*
    --cov-fail-under=80
    --html=reports/report.html
    --self-contained-html
asyncio_mode = auto 