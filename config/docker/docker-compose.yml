services:
  # Backend - FastAPI
  backend:
    # Producción: usar imagen publicada en Docker Hub (evita drift con CI)
    image: apmauj/sifu-backend:latest
    # Desarrollo local: usar archivo docker-compose.dev.yml con bloque build (ver añadido).
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: sifu-backend
    # Exponer solo a loopback para que no sea accesible desde otras máquinas.
    # Si se necesita acceso externo temporal, cambiar a "${BACKEND_PORT:-8000}:8000".
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    volumes:
      # Volumen para persistir la base de datos
      - ../data:/app/data
      # (Comentado) Montar el código fuente anula la imagen. Mantener desactivado en prod.
      # - .:/app
    env_file:
      - env/.env
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      DATABASE_PATH: /app/data/ui_data.db
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-true}"
      SCHEDULER_TIMEZONE: "${SCHEDULER_TIMEZONE:-America/Montevideo}"
      UI_REFRESH_CRON: "${UI_REFRESH_CRON:-0 3 * * *}"
      EXCHANGE_REFRESH_CRON: "${EXCHANGE_REFRESH_CRON:-0 3 * * *}"
      UR_REFRESH_CRON: "${UR_REFRESH_CRON:-0 4 1 * *}"
    networks:
      - sifu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend - React/Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sifu-frontend
    ports:
      - "31001:80"
    depends_on:
      - backend
    networks:
      - sifu-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


  # Nginx with HTTPS
  nginx:
    image: nginx:alpine
    container_name: sifu-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./ssl:/app/ssl:ro
      - ./nginx.https.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - sifu-network
    restart: unless-stopped

volumes:
  # Volumen nombrado para datos persistentes
  ui_data:
    driver: local

networks:
  # Red interna para comunicación entre servicios
  sifu-network:
    driver: bridge
