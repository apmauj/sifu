server {
    listen 80;
    server_name apmauj.ddns.net;

    # API de SIFU (debe ir antes que la configuración general)
    location /sifu/api {
        # Remover /sifu del path antes de enviar al backend
        rewrite ^/sifu/api/?(.*)$ /api/$1 break;
        
        # Proxy al backend de SIFU
        proxy_pass http://sifu-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Configuración para SIFU (frontend y archivos estáticos)
    location /sifu {
        # Remover /sifu del path antes de enviar al backend
        rewrite ^/sifu/?(.*)$ /$1 break;
        
        # Proxy al frontend de SIFU
        proxy_pass http://sifu-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Para WebSocket si es necesario
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Página principal o dashboard (opcional)
    location / {
        return 200 "Bienvenido a apmauj.ddns.net - Accede a SIFU en /sifu";
        add_header Content-Type text/plain;
    }
}
